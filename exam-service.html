<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Business Development Assessment - TERA</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
        .exam-container {
            max-width: 850px;
            margin: 2rem auto;
            padding: 1.5rem;
        }

        .q-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            padding: 1.8rem;
            border-radius: 15px;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .q-text {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
            line-height: 1.6;
        }

        .options-grid {
            display: grid;
            gap: 0.8rem;
        }

        .opt-btn {
            display: block;
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
            line-height: 1.4;
            color: white;
            text-align: left;
            font-size: 1rem;
            width: 100%;
        }

        .opt-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #f1c40f;
        }

        .progress-text {
            color: #f1c40f;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: right;
        }
    </style>
</head>

<body class="page-bg">
    <div class="bg-overlay"></div>
    <div class="exam-container">
        <header style="text-align: center; margin-bottom: 30px; color: white;">
            <img src="./Logo%20Veichi.png" alt="TERA" style="height: 60px;">
            <h1 style="margin-top: 15px;">แบบทดสอบตำแหน่ง Service Engineer / ช่างเซอร์วิส</h1>
            <p id="userInfo" style="opacity: 0.8;"></p>
        </header>

        <div id="questionsContainer">
        </div>
        </form>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzfvCXdieV_wEsn9RUH7icZpeyjSRuZ0AWHO0IUxrmNxkwnp4RE1V3fKA5WnOUo705Xpg/exec";
        const urlParams = new URLSearchParams(window.location.search);

        const userName = urlParams.get('name') || 'ผู้สมัคร';
        const userPos = urlParams.get('position') || 'Service';
        const uuid = urlParams.get('uuid') || "no-uuid";
        const questions = [
            { q: "1. หน้าที่หลักที่สำคัญที่สุดของ Service Engineer คืออะไร?", options: ["ก. ออกแบบเครื่องจักรใหม่ตั้งแต่ศูนย์", "ข. ขายอะไหล่ให้ได้กำไรสูงสุด", "ค. แก้ไขปัญหาเทคนิคให้ระบบกลับมาใช้งานได้เร็ว ปลอดภัย และลด Downtime", "ง. อยู่ประจำออฟฟิศเพื่อรับสายอย่างเดียว"], ans: 2 },
            { q: "2. หากลูกค้าโทรศัพท์มาตำหนิอย่างรุนแรงว่าเครื่องจักรเสียซ้ำซ้อน ควรทำอย่างไรเป็นอันดับแรก?", options: ["ก. ตั้งสติ รับฟังอย่างใจเย็น และเริ่มเก็บข้อมูลประวัติการซ่อม", "ข. บอกลูกค้าว่าต้องซื้อเครื่องใหม่เท่านั้น", "ค. วางสายทันทีเพราะลูกค้าไม่สุภาพ", "ง. ปฏิเสธความรับผิดชอบและชี้ว่าลูกค้าใช้งานผิด"], ans: 0 },
            { q: "3. ขั้นตอน 'Troubleshooting' ข้อใดที่เป็นระบบและมีประสิทธิภาพที่สุด?", options: ["ก. ถอดอุปกรณ์ทั้งหมดก่อนแล้วค่อยลองเปิดใหม่", "ข. สุ่มเปลี่ยนอะไหล่ไปเรื่อยๆ จนกว่าจะติด", "ค. ถามคนอื่นแล้วทำตามโดยไม่ตรวจหน้างาน", "ง. ยืนยันอาการ -> เก็บข้อมูล -> วิเคราะห์สาเหตุ -> แก้ไข -> ทดสอบ"], ans: 3 },
            { q: "4. การทำ 'Preventive Maintenance' (PM) มีวัตถุประสงค์เพื่ออะไร?", options: ["ก. บำรุงรักษาเชิงป้องกัน ลดโอกาสเสียหนัก และลด Downtime", "ข. รอให้เสียก่อนแล้วค่อยเข้าแก้ไข", "ค. ทำเพื่อคิดค่าบริการเพิ่มโดยไม่จำเป็น", "ง. ทำเพื่อเอาอะไหล่เก่ามาทำความสะอาดขายใหม่"], ans: 0 },
            { q: "5. หากต้องเปลี่ยนอะไหล่แพง แต่ลูกค้าขอให้ 'ซ่อมแบบชั่วคราว' ที่เสี่ยงอันตราย คุณจะทำอย่างไร?", options: ["ก. ทำตามลูกค้าเพื่อรักษาความสัมพันธ์", "ข. แอบนำอะไหล่บริษัทไปใช้ปิดงาน", "ค. เดินออกจากหน้างานทันที", "ง. อธิบายความเสี่ยง ทำบันทึกเป็นลายลักษณ์อักษรและแจ้งหัวหน้า"], ans: 3 },
            { q: "6. เครื่องมือใดถือเป็นเครื่องมือพื้นฐานที่สายไฟฟ้า/อิเล็กทรอนิกส์ ขาดไม่ได้?", options: ["ก. ตลับเมตร", "ข. เลื่อยเหล็ก", "ค. มัลติมิเตอร์", "ง. ค้อนปอนด์"], ans: 2 },
            { q: "7. 'Service Report' ที่ดีควรมีลักษณะอย่างไร?", options: ["ก. มีแต่รูปถ่ายไม่มีรายละเอียด", "ข. ระบุอาการ-สาเหตุ-แนวทางแก้-การทดสอบ-อะไหล่-ข้อเสนอแนะ", "ค. เขียนสั้นๆ ว่า 'ซ่อมเสร็จแล้ว'", "ง. เขียนลายมืออ่านยากไม่ให้ลูกค้าทราบขั้นตอน"], ans: 1 },
            { q: "8. หากไปถึงหน้างานแล้วพบว่าไม่มีอะไหล่ที่จำเป็นต้องใช้ในรถบริการ คุณควรทำอย่างไร?", options: ["ก. กลับบ้านทันที", "ข. ดัดแปลงใช้อะไหล่ใกล้เคียงแทน", "ค. บอกลูกค้าว่าซ่อมไม่ได้แล้วให้ยกเลิก", "ง. แจ้งลูกค้าตรงๆ ประเมินเวลาจัดหา และนัดหมายกลับมาซ่อมโดยเร็ว"], ans: 3 },
            { q: "9. การวัด 'SLA' (Service Level Agreement) ในงานเซอร์วิสหมายถึงอะไร?", options: ["ก. วัดระยะทางไปหน้างาน", "ข. จำนวนครั้งที่ช่างลากิจ", "ค. ความเร็วในการกินข้าว", "ง. ข้อตกลงระดับการให้บริการ เช่น เวลาตอบรับและเวลาปิดงาน"], ans: 3 },
            { q: "10. ก่อนที่จะเริ่มรื้อถอนเครื่องจักรเพื่อซ่อมแซม สิ่งที่ต้องทำเพื่อความปลอดภัยคือ?", options: ["ก. ถ่ายรูปเซลฟี่กับเครื่องจักร", "ข. สั่งให้ลูกค้าออกไปจากห้อง", "ค. เปิดเพลงเสียงดัง", "ง. ตัดแหล่งพลังงาน (Lock Out / Tag Out) และระบายพลังงานคงค้าง"], ans: 3 },
            { q: "11. 'Root Cause Analysis' (RCA) คืออะไร?", options: ["ก. การหาคนผิดเพื่อเรียกค่าเสียหาย", "ข. การวิเคราะห์หาสาเหตุที่แท้จริงเพื่อป้องกันการเกิดซ้ำ", "ค. การตรวจสอบประวัติพนักงาน", "ง. การตัดรากไม้ที่บังทาง"], ans: 1 },
            { q: "12. หากต้องทำงานในพื้นที่กฎระเบียบเข้มงวด (เช่น โรงงานสารเคมี) คุณควรปฏิบัติอย่างไร?", options: ["ก. ทำตามวิธีตัวเอง", "ข. ขอไม่ทำตามกฎเพราะงานช้า", "ค. แอบเข้าไปทำงานเงียบๆ", "ง. ศึกษากฎ ประสานขอใบอนุญาต (Permit) และปฏิบัติตามเคร่งครัด"], ans: 3 },
            { q: "13. คำว่า 'First Fix Rate' หมายความว่าอย่างไร?", options: ["ก. ราคาอะไหล่ชิ้นแรก", "ข. จำนวนช่างคนแรก", "ค. เวลาที่ใช้สตาร์ทเครื่องครั้งแรก", "ง. อัตราการซ่อมให้จบได้ภายใน การเข้าบริการครั้งแรก"], ans: 3 },
            { q: "14. เมื่อซ่อมเสร็จแล้ว ขั้นตอนสุดท้ายที่สำคัญที่สุดคืออะไร?", options: ["ก. ทดสอบการทำงานจริงร่วมกับลูกค้า ยืนยันผล และให้ลูกค้าลงนาม", "ข. เก็บเครื่องมือแล้วกลับทันที", "ค. โทรหาเพื่อนแจ้งว่าปิดงานแล้ว", "ง. ขอทิปจากลูกค้า"], ans: 0 },
            { q: "15. ทักษะ 'Critical Thinking' ช่วยงาน Service Engineer ได้อย่างไร?", options: ["ก. ช่วยจำรหัสผ่าน", "ข. ช่วยให้เถียงชนะลูกค้า", "ค. ช่วยวิเคราะห์ข้อมูลอย่างมีเหตุผล ลดการลองผิดลองถูก", "ง. ช่วยคิดข้ออ้างตอนซ่อมไม่เสร็จ"], ans: 2 },
            { q: "16. หากลูกค้าถามคำถามเทคนิคที่คุณไม่ทราบคำตอบ ควรทำอย่างไร?", options: ["ก. มโนคำตอบให้ดูโปร", "ข. บอกว่าเป็นความลับบริษัท", "ค. นิ่งเงียบไม่ตอบ", "ง. ตอบตรงๆ ว่าขอตรวจสอบข้อมูลก่อน และนัดเวลาอัปเดตที่ชัดเจน"], ans: 3 },
            { q: "17. หากตั้งย่านวัด (Range) เครื่องมือวัดไฟฟ้าผิดจะเกิดอะไรขึ้น?", options: ["ก. แสดงค่าถูกต้องเสมอ", "ข. โรงงานดับทั้งระบบ", "ค. เครื่องมือเสียหาย หรือเกิดอันตรายต่อผู้ใช้ เช่น ช็อต/อาร์ค", "ง. ไม่เกิดอะไรขึ้น"], ans: 2 },
            { q: "18. 'Corrective Maintenance' แตกต่างจาก 'Preventive' อย่างไร?", options: ["ก. เหมือนกันทุกประการ", "ข. Corrective ใช้เครื่องใหม่เท่านั้น", "ค. Corrective คือซ่อมฟรี", "ง. Corrective คือซ่อมเมื่อเสียแล้ว Preventive คือบำรุงก่อนเสีย"], ans: 3 },
            { q: "19. บุคลิกภาพใดที่ลูกค้าคาดหวังจากช่างเซอร์วิสมากที่สุด?", options: ["ก. แต่งตัวราคาแพง", "ข. ทำงานไวโดยไม่สนความถูกต้อง", "ค. พูดเก่งขายเก่ง", "ง. สุภาพ มีวินัย อธิบายชัดเจน และเน้นความปลอดภัย"], ans: 3 },
            { q: "20. หากงานซ่อมต้องใช้เวลานานกว่าที่ประเมินไว้มาก คุณควรทำอย่างไร?", options: ["ก. แอบหนีกลับบ้าน", "ข. ปิดโทรศัพท์หนี", "ค. ซ่อมแบบลวกๆ ให้ทันเวลา", "ง. อัปเดตสถานการณ์ให้ลูกค้าทราบเป็นระยะ และแจ้ง ETA ใหม่"], ans: 3 }
        ];

        let currentStep = 0;
        const userAnswers = [];

        window.onload = function () {
            document.getElementById('userInfo').textContent = `ผู้เข้าสอบ: คุณ ${userName} | ตำแหน่ง: ${userPos}`;
            renderQuestion();
        };

        function renderQuestion() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = "";

            const item = questions[currentStep];
            const card = document.createElement('div');
            card.className = 'q-card';
            card.innerHTML = `
                <div class="progress-text">ข้อที่ ${currentStep + 1} / ${questions.length}</div>
                <p class="q-text">${item.q}</p>
                <div class="options-grid">
                    ${item.options.map((opt, i) => `
                        <button type="button" class="opt-btn" onclick="selectOption(${i})">
                            ${opt}
                        </button>
                    `).join('')}
                </div>`;
            container.appendChild(card);
        }

        async function selectOption(choiceIndex) {
            const item = questions[currentStep];
            userAnswers.push({
                text: item.options[choiceIndex],
                isCorrect: choiceIndex === item.ans
            });

            if (currentStep < questions.length - 1) {
                currentStep++;
                renderQuestion();
            } else {
                await finishExam();
            }
        }

        async function finishExam() {
            const container = document.getElementById('questionsContainer');
            // เปลี่ยน UI ให้ดูนิ่งขึ้นขณะรอ
            container.innerHTML = `
        <div class="q-card" style="text-align:center; padding: 3rem;">
            <div class="spinner" style="border: 4px solid #f3f3f3; border-top: 4px solid #f1c40f; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
            <h2 style="color:#f1c40f;">กำลังบันทึกข้อมูล...</h2>
            <p>กรุณาอย่าปิดหน้าต่างนี้ ระบบกำลังนำส่งคำถามและคำตอบของคุณ</p>
        </div>
        <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>`;

            let score = 0;
            const payload = {
                targetTab: userPos,
                uuid: uuid,
                name: userName,
                position: userPos,
                answersCount: questions.length,
                userAgent: navigator.userAgent
            };

            userAnswers.forEach((ans, i) => {
                if (ans.isCorrect) score++;
                payload[`q${i + 1}_title`] = questions[i].q; // ส่งคำถาม
                payload[`q${i + 1}_text`] = ans.text;        // ส่งคำตอบ
                payload[`q${i + 1}_score`] = ans.isCorrect ? "1" : "0"; // ส่งคะแนน
            });

            payload.totalScore = String(score);
            payload.hrStatus = score >= 14 ? "🟢 ผ่าน (เรียกสัมภาษณ์)" : (score >= 10 ? "🟡 พิจารณาพิเศษ" : "🔴 ไม่ผ่าน");
            payload.decisionNote = score >= 14 ? "เรียกสัมภาษณ์" : (score >= 10 ? "พิจารณา Resume เพิ่มเติม" : "ไม่แนะนำ");

            try {
                const body = new URLSearchParams();
                for (const key in payload) { body.append(key, payload[key]); }

                await fetch(SCRIPT_URL, { method: "POST", body: body, mode: "no-cors" });

                // ✅ เรียกใช้ Modal แทน alert
                document.getElementById('customModal').style.display = 'block';

            } catch (err) {
                console.error(err);
                // ถึงจะ Error แต่ถ้าส่งไปแล้วก็ให้แสดง Modal เพื่อให้คนสอบกลับหน้าแรกได้
                document.getElementById('customModal').style.display = 'block';
            }
        }

        function goHome() {
            window.location.href = "index.html";
        }
    </script>

    <div id="customModal" style="display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; 
           background: transparent; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);">

        <div class="bg-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;">
        </div>

        <div style="background: rgba(255, 255, 255, 0.1); 
                backdrop-filter: blur(15px); 
                -webkit-backdrop-filter: blur(15px);
                color: white; 
                margin: 12% auto; 
                padding: 3rem 2rem; 
                border-radius: 20px; 
                width: 85%; 
                max-width: 450px; 
                text-align: center; 
                border: 1px solid rgba(255, 255, 255, 0.2); 
                box-shadow: 0 20px 50px rgba(0,0,0,0.5);
                animation: fadeIn 0.5s ease-in-out;">

            <div style="font-size: 4.5rem; margin-bottom: 1.5rem;">✅</div>

            <h2 style="color: #f1c40f; margin-top: 0; font-size: 2rem; text-shadow: 0 2px 10px rgba(0,0,0,0.3);">
                ขอบคุณสำหรับคำตอบ!
            </h2>

            <p style="font-size: 1.2rem; opacity: 0.95; line-height: 1.6; margin-bottom: 2rem;">
                ขอให้คุณโชคดีในการสัมภาษณ์
            </p>

            <button onclick="goHome()" style="background: #27ae60; 
                   color: white; 
                   border: none; 
                   padding: 15px 40px; 
                   border-radius: 12px; 
                   cursor: pointer; 
                   font-size: 1.2rem; 
                   font-weight: bold; 
                   transition: 0.3s; 
                   width: 100%;
                   box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4);">
                ตกลง
            </button>
        </div>
    </div>
</body>


</html>
