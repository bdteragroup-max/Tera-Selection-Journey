<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Business Development Assessment - TERA</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
        .exam-container {
            max-width: 850px;
            margin: 2rem auto;
            padding: 1.5rem;
        }

        .q-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            padding: 1.8rem;
            border-radius: 15px;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .q-text {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
            line-height: 1.6;
        }

        .options-grid {
            display: grid;
            gap: 0.8rem;
        }

        .opt-btn {
            display: block;
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
            line-height: 1.4;
            color: white;
            text-align: left;
            font-size: 1rem;
            width: 100%;
        }

        .opt-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #f1c40f;
        }

        .progress-text {
            color: #f1c40f;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: right;
        }
    </style>
</head>

<body class="page-bg">
    <div class="bg-overlay"></div>
    <div class="exam-container">
        <header style="text-align: center; margin-bottom: 30px; color: white;">
            <img src="./Logo%20Veichi.png" alt="TERA" style="height: 60px;">
            <h1 style="margin-top: 15px;">แบบทดสอบมาตรฐานวิชาชีพบัญชี (Accountant)</h1>
            <p id="userInfo" style="opacity: 0.8;"></p>
        </header>



        <div id="accountingForm">
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzfvCXdieV_wEsn9RUH7icZpeyjSRuZ0AWHO0IUxrmNxkwnp4RE1V3fKA5WnOUo705Xpg/exec";
        const urlParams = new URLSearchParams(window.location.search);

        const userName = urlParams.get('name') || 'ผู้สมัคร';
        const userPos = urlParams.get('position') || 'Accounting';
        const uuid = urlParams.get('uuid') || "no-uuid";

        const questions = [
            { q: "1. สมการบัญชี (Accounting Equation) ที่ถูกต้องคือข้อใด?", options: ["ก. สินทรัพย์ = หนี้สิน - ส่วนของเจ้าของ", "ข. สินทรัพย์ = หนี้สิน + ส่วนของเจ้าของ", "ค. หนี้สิน = สินทรัพย์ + ส่วนของเจ้าของ", "ง. ส่วนของเจ้าของ = หนี้สิน - สินทรัพย์"], ans: 1 },
            { q: "2. รายการใดถือเป็น 'สินทรัพย์ไม่หมุนเวียน' (Non-current Assets)?", options: ["ก. เงินสดและเงินฝากธนาคาร", "ข. ลูกหนี้การค้า", "ค. สินค้าคงเหลือ", "ง. ที่ดิน อาคาร และอุปกรณ์"], ans: 3 },
            { q: "3. การบันทึกบัญชีตามระบบ 'เกณฑ์คงค้าง' (Accrual Basis) หมายถึงอะไร?", options: ["ก. บันทึกเมื่อรับ/จ่ายเงินสดจริงเท่านั้น", "ข. บันทึกรายได้และค่าใช้จ่ายในงวดที่เกิดขึ้น แม้เงินสดยังไม่รับหรือจ่าย", "ค. บันทึกเฉพาะรายการที่ค้างชำระ", "ง. บันทึกเฉพาะรายการเงินสดเพื่อให้ปิดงบรวดเร็ว"], ans: 1 },
            { q: "4. หากบริษัทจ่ายเงินค่าเบี้ยประกันภัยล่วงหน้า 1 ปี (Prepaid Insurance) รายการนี้ควรจัดประเภทเป็นอะไร?", options: ["ก. ค่าใช้จ่ายทั้งหมดของงวดทันที", "ข. สินทรัพย์หมุนเวียน (ทยอยตัดเป็นค่าใช้จ่าย)", "ค. หนี้สินหมุนเวียน", "ง. ส่วนของเจ้าของ"], ans: 1 },
            { q: "5. ภาษีเงินได้หัก ณ ที่จ่าย (Withholding Tax) กรณีจ่ายค่าบริการให้บริษัทในประเทศ โดยทั่วไปคือร้อยละเท่าใด?", options: ["ก. 1%", "ข. 3%", "ค. 5%", "ง. 7%"], ans: 1 },
            { q: "6. 'งบกำไรขาดทุน' (Income Statement) แสดงข้อมูลเกี่ยวกับอะไร?", options: ["ก. ฐานะการเงิน ณ วันใดวันหนึ่ง", "ข. ผลการดำเนินงานในช่วงเวลาหนึ่ง (รายได้, ค่าใช้จ่าย, กำไรสุทธิ)", "ค. รายละเอียดหนี้สินแยกตามเจ้าหนี้", "ง. การเปลี่ยนแปลงส่วนของเจ้าของอย่างเดียว"], ans: 1 },
            { q: "7. รายการใดต่อไปนี้ที่ 'ไม่ต้อง' นำมาคำนวณค่าเสื่อมราคา (Depreciation)?", options: ["ก. รถยนต์", "ข. เครื่องจักร", "ค. คอมพิวเตอร์", "ง. ที่ดิน"], ans: 3 },
            { q: "8. การกระทบยอดเงินฝากธนาคาร (Bank Reconciliation) มีวัตถุประสงค์เพื่ออะไร?", options: ["ก. ตรวจสอบความแตกต่างระหว่างสมุดบัญชีบริษัทกับ Statement ธนาคาร", "ข. ขอรับดอกเบี้ยเพิ่มจากธนาคาร", "ค. แจ้งยอดหนี้ให้ลูกค้าทราบ", "ง. ใช้สำหรับคำนวณ VAT"], ans: 0 },
            { q: "9. ภาษีมูลค่าเพิ่ม (VAT) ในปัจจุบันของประเทศไทย (อัตราปกติ) คือร้อยละเท่าใด?", options: ["ก. 3%", "ข. 5%", "ค. 7%", "ง. 10%"], ans: 2 },
            { q: "10. ในระบบบัญชีคู่ รายการซื้อสินค้าเป็นเงินเชื่อ จะบันทึกบัญชีอย่างไร?", options: ["ก. เดบิต ซื้อสินค้า / เครดิต เงินสด", "ข. เดบิต ซื้อสินค้า (หรือสินค้าคงเหลือ) / เครดิต เจ้าหนี้การค้า", "ค. เดบิต เจ้าหนี้การค้า / เครดิต ซื้อสินค้า", "ง. เดบิต เงินสด / เครดิต ขายสินค้า"], ans: 1 },
            { q: "11. 'ค่าเผื่อหนี้สงสัยจะสูญ' (Allowance for Doubtful Accounts) ถูกจัดประเภทเป็นรายการใด?", options: ["ก. หนี้สินหมุนเวียน", "ข. รายได้รอการตัดบัญชี", "ค. รายการปรับลดยอดลูกหนี้ (Contra Asset)", "ง. ส่วนของเจ้าของ"], ans: 2 },
            { q: "12. งบแสดงการเปลี่ยนแปลงส่วนของเจ้าของ บอกข้อมูลอะไรแก่ผู้ใช้บัญชี?", options: ["ก. จำนวนสินค้าคงเหลือที่ขายได้จริง", "ข. รายชื่อเจ้าหนี้ทั้งหมดและยอดคงเหลือ", "ค. การเปลี่ยนแปลงของทุน กำไรสะสม และเงินปันผลในงวด", "ง. ตารางการชำระหนี้ธนาคาร"], ans: 2 },
            { q: "13. หลักการ 'ความระมัดระวัง' (Prudence) ในทางการบัญชีหมายถึงอะไร?", options: ["ก. บันทึกรายได้ให้สูงไว้ก่อนเพื่อความน่าเชื่อถือ", "ข. ไม่ต้องบันทึกหนี้สินจนกว่าจะถูกฟ้อง", "ค. เก็บเงินสดไว้ให้มากที่สุด", "ง. รับรู้ความสูญเสียเมื่อมีความเป็นไปได้ แต่ไม่รับรู้กำไรเกินจริง"], ans: 3 },
            { q: "14. ค่าใช้จ่ายใดต่อไปนี้ ถือเป็น 'รายจ่ายต้องห้าม' ในการคำนวณภาษีเงินได้นิติบุคคล?", options: ["ก. เงินเดือนพนักงาน", "ข. ค่าโฆษณาที่มีหลักฐานครบถ้วน", "ค. ค่ารับรองลูกค้าที่อยู่ในเกณฑ์", "ง. รายจ่ายส่วนตัว/เสน่หา/ไม่มีหลักฐานผู้รับเงิน"], ans: 3 },
            { q: "15. FIFO (First-In, First-Out) คือวิธีการคำนวณสิ่งใด?", options: ["ก. วิธีคำนวณภาษีเงินได้", "ข. วิธีการตีราคาสินค้าคงเหลือ (เข้าก่อนออกก่อน)", "ค. วิธีคำนวณค่าเสื่อมราคาเส้นตรง", "ง. วิธีบริหารพนักงานเข้าใหม่"], ans: 1 },
            { q: "16. หากบัญชีด้าน Debit มียอดสูงกว่า Credit ในบัญชีแยกประเภท 'สินทรัพย์' หมายความว่าอย่างไร?", options: ["ก. สินทรัพย์ลดลง", "ข. บริษัทขาดทุนอย่างรุนแรง", "ค. เกิดข้อผิดพลาด", "ง. สินทรัพย์มียอดคงเหลือปกติ (ยังมีมูลค่าคงเหลือ)"], ans: 3 },
            { q: "17. กระดาษทำการ (Working Paper) มีความสำคัญอย่างไร?", options: ["ก. ต้องส่งสรรพากรทุกเดือน", "ข. เป็นเครื่องมือรวบรวมข้อมูลเพื่อปรับปรุงบัญชีและปิดงบ", "ค. เป็นใบเสร็จรับเงินชั่วคราว", "ง. เป็นสัญญาจ้างงานพนักงานบัญชี"], ans: 1 },
            { q: "18. ภาษีซื้อ (Input Tax) จะถือเป็นภาษีต้องห้าม (ขอคืนไม่ได้) ในกรณีใด?", options: ["ก. ซื้อวัตถุดิบเพื่อผลิตสินค้า", "ข. ซื้อรถกระบะมาใช้ในกิจการ", "ค. ค่าใช้จ่ายรับรองบางประเภทตามเงื่อนไขสรรพากร", "ง. มีใบกำกับภาษีเต็มรูปแบบถูกต้อง"], ans: 2 },
            { q: "19. ในงบกระแสเงินสด กิจกรรมใดที่เกี่ยวข้องกับการกู้ยืมเงินจากธนาคาร?", options: ["ก. กิจกรรมดำเนินงาน", "ข. กิจกรรมลงทุน", "ค. กิจกรรมจัดหาเงิน (Financing Activities)", "ง. กิจกรรมบริหารจัดการ"], ans: 2 },
            { q: "20. จรรยาบรรณวิชาชีพบัญชีข้อใดสำคัญที่สุดเมื่อถูกสั่งให้ตกแต่งตัวเลขกำไร?", options: ["ก. ความเชื่อฟังต่อผู้บังคับบัญชา", "ข. ความรวดเร็วในการส่งงบ", "ค. ความสวยงามของรายงาน", "ง. ความซื่อสัตย์และความเที่ยงธรรม (Integrity & Objectivity)"], ans: 3 }
        ];

        let currentStep = 0;
        const userAnswers = [];

        window.onload = function () {
            document.getElementById('userInfo').textContent = `ผู้เข้าสอบ: คุณ ${userName} | ตำแหน่ง: ${userPos}`;
            renderQuestion();
        };

        function renderQuestion() {
            const container = document.getElementById('accountingForm');
            container.innerHTML = "";

            const item = questions[currentStep];
            const card = document.createElement('div');
            card.className = 'q-card';
            card.innerHTML = `
                <div class="progress-text">ข้อที่ ${currentStep + 1} / ${questions.length}</div>
                <p class="q-text">${item.q}</p>
                <div class="options-grid">
                    ${item.options.map((opt, i) => `
                        <button type="button" class="opt-btn" onclick="selectOption(${i})">
                            ${opt}
                        </button>
                    `).join('')}
                </div>`;
            container.appendChild(card);
        }

        async function selectOption(choiceIndex) {
            const item = questions[currentStep];
            userAnswers.push({
                text: item.options[choiceIndex],
                isCorrect: choiceIndex === item.ans
            });

            if (currentStep < questions.length - 1) {
                currentStep++;
                renderQuestion();
            } else {
                await finishExam();
            }
        }

        async function finishExam() {
            const container = document.getElementById('accountingForm');
            // เปลี่ยน UI ให้ดูนิ่งขึ้นขณะรอ
            container.innerHTML = `
        <div class="q-card" style="text-align:center; padding: 3rem;">
            <div class="spinner" style="border: 4px solid #f3f3f3; border-top: 4px solid #f1c40f; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
            <h2 style="color:#f1c40f;">กำลังบันทึกข้อมูล...</h2>
            <p>กรุณาอย่าปิดหน้าต่างนี้ ระบบกำลังนำส่งคำถามและคำตอบของคุณ</p>
        </div>
        <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>`;

            let score = 0;
            const payload = {
                targetTab: userPos,
                uuid: uuid,
                name: userName,
                position: userPos,
                answersCount: questions.length,
                userAgent: navigator.userAgent
            };

            userAnswers.forEach((ans, i) => {
                if (ans.isCorrect) score++;
                payload[`q${i + 1}_title`] = questions[i].q; // ส่งคำถาม
                payload[`q${i + 1}_text`] = ans.text;        // ส่งคำตอบ
                payload[`q${i + 1}_score`] = ans.isCorrect ? "1" : "0"; // ส่งคะแนน
            });

            payload.totalScore = String(score);
            payload.hrStatus = score >= 14 ? "🟢 ผ่าน (เรียกสัมภาษณ์)" : (score >= 10 ? "🟡 พิจารณาพิเศษ" : "🔴 ไม่ผ่าน");
            payload.decisionNote = score >= 14 ? "เรียกสัมภาษณ์" : (score >= 10 ? "พิจารณา Resume เพิ่มเติม" : "ไม่แนะนำ");

            try {
                const body = new URLSearchParams();
                for (const key in payload) { body.append(key, payload[key]); }

                await fetch(SCRIPT_URL, { method: "POST", body: body, mode: "no-cors" });

                // ✅ เรียกใช้ Modal แทน alert
                document.getElementById('customModal').style.display = 'block';

            } catch (err) {
                console.error(err);
                // ถึงจะ Error แต่ถ้าส่งไปแล้วก็ให้แสดง Modal เพื่อให้คนสอบกลับหน้าแรกได้
                document.getElementById('customModal').style.display = 'block';
            }
        }

        function goHome() {
            window.location.href = "index.html";
        }
    </script>

    <div id="customModal" style="display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; 
           background: transparent; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);">

        <div class="bg-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;">
        </div>

        <div style="background: rgba(255, 255, 255, 0.1); 
                backdrop-filter: blur(15px); 
                -webkit-backdrop-filter: blur(15px);
                color: white; 
                margin: 12% auto; 
                padding: 3rem 2rem; 
                border-radius: 20px; 
                width: 85%; 
                max-width: 450px; 
                text-align: center; 
                border: 1px solid rgba(255, 255, 255, 0.2); 
                box-shadow: 0 20px 50px rgba(0,0,0,0.5);
                animation: fadeIn 0.5s ease-in-out;">

            <div style="font-size: 4.5rem; margin-bottom: 1.5rem;">✅</div>

            <h2 style="color: #f1c40f; margin-top: 0; font-size: 2rem; text-shadow: 0 2px 10px rgba(0,0,0,0.3);">
                ขอบคุณสำหรับคำตอบ!
            </h2>

            <p style="font-size: 1.2rem; opacity: 0.95; line-height: 1.6; margin-bottom: 2rem;">
                ขอให้คุณโชคดีในการสัมภาษณ์
            </p>

            <button onclick="goHome()" style="background: #27ae60; 
                   color: white; 
                   border: none; 
                   padding: 15px 40px; 
                   border-radius: 12px; 
                   cursor: pointer; 
                   font-size: 1.2rem; 
                   font-weight: bold; 
                   transition: 0.3s; 
                   width: 100%;
                   box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4);">
                ตกลง
            </button>
        </div>
    </div>
</body>


</html>
