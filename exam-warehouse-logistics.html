<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Business Development Assessment - TERA</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
        .exam-container {
            max-width: 850px;
            margin: 2rem auto;
            padding: 1.5rem;
        }

        .q-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            padding: 1.8rem;
            border-radius: 15px;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .q-text {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
            line-height: 1.6;
        }

        .options-grid {
            display: grid;
            gap: 0.8rem;
        }

        .opt-btn {
            display: block;
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
            line-height: 1.4;
            color: white;
            text-align: left;
            font-size: 1rem;
            width: 100%;
        }

        .opt-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #f1c40f;
        }

        .progress-text {
            color: #f1c40f;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: right;
        }
    </style>
</head>

<body class="page-bg">
    <div class="bg-overlay"></div>
    <div class="exam-container">
        <header style="text-align: center; margin-bottom: 30px; color: white;">
            <img src="./Logo%20Veichi.png" alt="TERA" style="height: 60px;">
            <h1 style="margin-top: 15px;">แบบทดสอบตำแหน่ง คลังสินค้าและขนส่ง</h1>
            <p id="userInfo" style="opacity: 0.8;"></p>
        </header>

        <div id="questionsContainer">
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzfvCXdieV_wEsn9RUH7icZpeyjSRuZ0AWHO0IUxrmNxkwnp4RE1V3fKA5WnOUo705Xpg/exec";
        const urlParams = new URLSearchParams(window.location.search);

        const userName = urlParams.get('name') || 'ผู้สมัคร';
        const userPos = urlParams.get('position') || 'Warehouse_Logistics';
        const uuid = urlParams.get('uuid') || "no-uuid";
        const questions = [
            { q: "1. หน้าที่หลักของการบริหารคลังสินค้า (Warehouse Management) คือข้อใด?", options: ["ก. บริหารพื้นที่และการจัดวางเพื่อให้สินค้าพร้อมสูงสุด ลดความสูญเสีย", "ข. เน้นเก็บสินค้าให้มากที่สุดแม้จะจ่ายของช้าลง", "ค. จัดการเบิกจ่ายตามความต้องการเร่งด่วนโดยไม่สนยอดจริง", "ง. เพิ่มสต็อกสำรองให้สูงกว่าความต้องการเสมอ"], ans: 0 },
            { q: "2. ระบบ 'FIFO' (First-In, First-Out) มีความสำคัญอย่างไร?", options: ["ก. เป็นวิธีจัดลำดับงานบัญชีเท่านั้น", "ข. สินค้าที่เข้าก่อนถูกหยิบออกก่อน ลดความเสี่ยงเสื่อมสภาพ/หมดอายุ", "ค. เหมาะสำหรับสินค้าราคาแพงเท่านั้น", "ง. ใช้จัดเรียงสินค้าให้สวยงามโดยไม่สนรอบอายุ"], ans: 1 },
            { q: "3. 'Stock Card' มีไว้เพื่อวัตถุประสงค์ใด?", options: ["ก. ใช้แทนเอกสารจัดซื้อและขาย", "ข. ใช้ประเมินความขยันของพนักงาน", "ค. บันทึกการเคลื่อนไหวรับ–จ่าย–คงเหลือแบบตรวจสอบย้อนหลังได้", "ง. ใช้กำหนดราคาขายสินค้า"], ans: 2 },
            { q: "4. หากพบยอดสินค้าจริงไม่ตรงกับยอดในระบบ คุณควรทำอย่างไรเป็นอันดับแรก?", options: ["ก. อายัดการจ่าย ตรวจเอกสารย้อนหลัง และนับซ้ำเพื่อระบุสาเหตุ", "ข. ปรับยอดในระบบให้ตรงทันที", "ค. รอให้ถึงรอบตรวจสต็อกประจำเดือน", "ง. สรุปว่าเป็นความผิดกะก่อนหน้าโดยไม่นับซ้ำ"], ans: 0 },
            { q: "5. อุปกรณ์ใดที่ 'ห้าม' นำมาใช้ในคลังจัดเก็บวัตถุไวไฟเด็ดขาด?", options: ["ก. พาเลทไม้", "ข. เครื่องสแกนบาร์โค้ด", "ค. รถเข็นแมนนวล", "ง. กิจกรรมที่ก่อประกายไฟ/ความร้อน หรืออุปกรณ์ไม่กันระเบิด"], ans: 3 },
            { q: "6. 'Cycle Count' หมายถึงกระบวนการใด?", options: ["ก. การสุ่มนับสต็อกตามรอบที่กำหนดเพื่อลดผลกระทบต่องานปกติ", "ข. การนับสต็อกเฉพาะสิ้นปีเท่านั้น", "ค. การนับเฉพาะสินค้าที่ขายดีมาก", "ง. การนับสต็อกเมื่อมีการเบิกผิดพลาดเท่านั้น"], ans: 0 },
            { q: "7. ในการขับรถโฟล์คลิฟท์ (Forklift) ข้อใดคือหลักความปลอดภัยที่ถูกต้อง?", options: ["ก. บรรทุกให้สูงเกินสายตาได้ถ้าขับช้า", "ข. ยกงาให้สูงตลอดเวลาเพื่อเลี่ยงสิ่งกีดขวาง", "ค. ขับความเร็วเหมาะสม งาอยู่ต่ำเหนือพื้นเล็กน้อย รักษาทัศนวิสัย", "ง. อนุญาตให้คนนั่งบนงาได้ถ้าทางแคบ"], ans: 2 },
            { q: "8. 'Cross-Docking' ในทางโลจิสติกส์หมายถึงอะไร?", options: ["ก. การย้ายสินค้าจากคลังหนึ่งไปอีกคลังหนึ่ง", "ข. การเก็บสินค้าตามโซนชั้นวางให้ครบก่อนส่ง", "ค. การลดรอบขนส่งโดยการส่งเที่ยวเดียว", "ง. กระบวนการรับสินค้าแล้วถ่ายโอนส่งต่อทันทีโดยแทบไม่เก็บเข้าคลัง"], ans: 3 },
            { q: "9. สินค้าที่มีน้ำหนักมาก (Heavy Items) ควรวางไว้ตำแหน่งใดบน Rack?", options: ["ก. ชั้นล่างสุดหรือระดับต่ำ เพื่อความมั่นคงและปลอดภัย", "ข. ชั้นกลางระดับสายตา", "ค. ชั้นบนสุดเพื่อป้องกันการหยิบผิด", "ง. วางตำแหน่งใดก็ได้ถ้าใช้พาเลท"], ans: 0 },
            { q: "10. คำว่า 'SKU' (Stock Keeping Unit) หมายถึงอะไร?", options: ["ก. รหัสพิกัดชั้นวาง", "ข. รหัสที่ใช้แยกความแตกต่างของสินค้าแต่ละรายการ (รุ่น/สี/ขนาด)", "ค. หมายเลขการติดตามขนส่ง", "ง. รหัสเอกสารรับสินค้าเข้า"], ans: 1 },
            { q: "11. ในการวางแผนเส้นทางขนส่ง (Route Planning) ปัจจัยใดสำคัญที่สุด?", options: ["ก. ลดเวลา ระยะทาง และเชื้อเพลิง พร้อมส่งมอบตรงเวลา (SLA)", "ข. เลือกถนนที่ขับสบายที่สุดแม้จะอ้อมไกล", "ค. จัดให้แวะหลายจุดที่สุดเพื่อเพิ่มปริมาณ", "ง. จัดเส้นทางตามความคุ้นชินของคนขับ"], ans: 0 },
            { q: "12. เอกสาร 'Bill of Lading' (B/L) มีความสำคัญอย่างไร?", options: ["ก. ใช้เฉพาะงานนำเข้าเท่านั้น", "ข. เป็นเอกสารด้านภาษีเท่านั้น", "ค. เป็นหลักฐานการรับขนสินค้าและสัญญาการขนส่ง", "ง. เป็นเอกสารภายในคลังไม่มีผลทางกฎหมาย"], ans: 2 },
            { q: "13. หากเกิดอุบัติเหตุขณะขนส่งสินค้า คุณควรสั่งการอย่างไรเป็นลำดับแรก?", options: ["ก. สอบถามมูลค่าความเสียหาย", "ข. สั่งให้รีบส่งของต่อให้ทันกำหนด", "ค. สั่งให้เคลื่อนย้ายรถทันทีโดยไม่ถ่ายรูป", "ง. ตรวจสอบความปลอดภัยของคน ประเมินหน้างาน และรายงานตามลำดับ"], ans: 3 },
            { q: "14. การบริหารจัดการแบบ 'JIT' (Just-In-Time) ช่วยลดสิ่งใดมากที่สุด?", options: ["ก. ลดต้นทุนถือครอง พื้นที่จัดเก็บ และเงินจมในสต็อก", "ข. ลดจำนวนพนักงานคลัง", "ค. ลดความจำเป็นของรถขนส่ง", "ง. ลดความเสี่ยงสินค้าชำรุด"], ans: 0 },
            { q: "15. 'Dead Stock' หมายความถึงสินค้าประเภทใด?", options: ["ก. สินค้ายอดนิยมช่วงสั้นๆ", "ข. สินค้ามาใหม่ยังไม่ได้กระจาย", "ค. สินค้าค้างนาน ไม่เคลื่อนไหว ล้าสมัย หรือขายไม่ได้", "ง. สินค้ากักกันคุณภาพ"], ans: 2 },
            { q: "16. ก่อนปิดท้ายรถบรรทุกเพื่อเดินทาง พนักงานควรตรวจสอบสิ่งใด?", options: ["ก. ความสะอาดภายในตู้รถ", "ข. ลายเซ็นเอกสารครบถ้วนอย่างเดียว", "ค. เวลารถออกให้ทันกำหนด", "ง. การจัดเรียงแน่นหนา มีการรัด/ล็อค และไม่มีช่องว่างเสี่ยงกระแทก"], ans: 3 },
            { q: "17. อุปกรณ์ 'Hand Lift' (รถลากพาเลท) มีข้อจำกัดอย่างไร?", options: ["ก. ใช้ได้ตามพิกัดน้ำหนัก พื้นเรียบ ระยะใกล้ ไม่เหมาะยกสูง/ทางลาด", "ข. ใช้ได้ทุกพื้นผิวถ้ามีคนช่วยเข็น", "ค. ใช้แทนโฟล์คลิฟท์ได้เต็มรูปแบบ", "ง. ใช้ได้เฉพาะสินค้าน้ำหนักเบาเท่านั้น"], ans: 0 },
            { q: "18. 'KPI' ที่ใช้บ่อยในงานขนส่งคือข้อใด?", options: ["ก. ปริมาณการเติมน้ำมันรถ", "ข. อัตราส่งมอบตรงเวลา (On-Time) และความถูกต้อง/ไม่เสียหาย", "ค. จำนวนเส้นทางที่คนขับจำได้", "ง. จำนวนคำชมจากลูกค้าเท่านั้น"], ans: 1 },
            { q: "19. หากลูกค้าปฏิเสธการรับเพราะ 'กล่องบุบ' แต่ของข้างในปกติ คุณควรทำอย่างไร?", options: ["ก. ให้เซ็นรับไปก่อนแล้วค่อยร้องเรียน", "ข. วางไว้หน้าบ้านถ้าของไม่เสีย", "ค. เจรจา บันทึกสภาพ ทำหลักฐาน และรับกลับเพื่อเปลี่ยนบรรจุภัณฑ์", "ง. ยืนยันให้รับเพราะไม่กระทบสินค้า"], ans: 2 },
            { q: "20. จรรยาบรรณที่สำคัญที่สุดของพนักงานคลังสินค้าคือข้อใด?", options: ["ก. ความซื่อสัตย์สุจริต ควบคุมความถูกต้อง และรักษาทรัพย์สินบริษัท", "ข. ความเร็วในการทำงานเป็นหลัก", "ค. การจำรหัสสินค้าได้แม่นยำที่สุด", "ง. การทำงานล่วงเวลาได้ตลอด"], ans: 0 }
        ];

        let currentStep = 0;
        const userAnswers = [];

        window.onload = function () {
            document.getElementById('userInfo').textContent = `ผู้เข้าสอบ: คุณ ${userName} | ตำแหน่ง: ${userPos}`;
            renderQuestion();
        };

        function renderQuestion() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = "";

            const item = questions[currentStep];
            const card = document.createElement('div');
            card.className = 'q-card';
            card.innerHTML = `
                <div class="progress-text">ข้อที่ ${currentStep + 1} / ${questions.length}</div>
                <p class="q-text">${item.q}</p>
                <div class="options-grid">
                    ${item.options.map((opt, i) => `
                        <button type="button" class="opt-btn" onclick="selectOption(${i})">
                            ${opt}
                        </button>
                    `).join('')}
                </div>`;
            container.appendChild(card);
        }

        async function selectOption(choiceIndex) {
            const item = questions[currentStep];
            userAnswers.push({
                text: item.options[choiceIndex],
                isCorrect: choiceIndex === item.ans
            });

            if (currentStep < questions.length - 1) {
                currentStep++;
                renderQuestion();
            } else {
                await finishExam();
            }
        }

        async function finishExam() {
            const container = document.getElementById('questionsContainer');
            // เปลี่ยน UI ให้ดูนิ่งขึ้นขณะรอ
            container.innerHTML = `
        <div class="q-card" style="text-align:center; padding: 3rem;">
            <div class="spinner" style="border: 4px solid #f3f3f3; border-top: 4px solid #f1c40f; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
            <h2 style="color:#f1c40f;">กำลังบันทึกข้อมูล...</h2>
            <p>กรุณาอย่าปิดหน้าต่างนี้ ระบบกำลังนำส่งคำถามและคำตอบของคุณ</p>
        </div>
        <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>`;

            let score = 0;
            const payload = {
                targetTab: userPos,
                uuid: uuid,
                name: userName,
                position: userPos,
                answersCount: questions.length,
                userAgent: navigator.userAgent
            };

            userAnswers.forEach((ans, i) => {
                if (ans.isCorrect) score++;
                payload[`q${i + 1}_title`] = questions[i].q; // ส่งคำถาม
                payload[`q${i + 1}_text`] = ans.text;        // ส่งคำตอบ
                payload[`q${i + 1}_score`] = ans.isCorrect ? "1" : "0"; // ส่งคะแนน
            });

            payload.totalScore = String(score);
            payload.hrStatus = score >= 14 ? "🟢 ผ่าน (เรียกสัมภาษณ์)" : (score >= 10 ? "🟡 พิจารณาพิเศษ" : "🔴 ไม่ผ่าน");
            payload.decisionNote = score >= 14 ? "เรียกสัมภาษณ์" : (score >= 10 ? "พิจารณา Resume เพิ่มเติม" : "ไม่แนะนำ");

            try {
                const body = new URLSearchParams();
                for (const key in payload) { body.append(key, payload[key]); }

                await fetch(SCRIPT_URL, { method: "POST", body: body, mode: "no-cors" });

                // ✅ เรียกใช้ Modal แทน alert
                document.getElementById('customModal').style.display = 'block';

            } catch (err) {
                console.error(err);
                // ถึงจะ Error แต่ถ้าส่งไปแล้วก็ให้แสดง Modal เพื่อให้คนสอบกลับหน้าแรกได้
                document.getElementById('customModal').style.display = 'block';
            }
        }

        function goHome() {
            window.location.href = "index.html";
        }
    </script>

    <div id="customModal" style="display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; 
           background: transparent; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);">

        <div class="bg-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;">
        </div>

        <div style="background: rgba(255, 255, 255, 0.1); 
                backdrop-filter: blur(15px); 
                -webkit-backdrop-filter: blur(15px);
                color: white; 
                margin: 12% auto; 
                padding: 3rem 2rem; 
                border-radius: 20px; 
                width: 85%; 
                max-width: 450px; 
                text-align: center; 
                border: 1px solid rgba(255, 255, 255, 0.2); 
                box-shadow: 0 20px 50px rgba(0,0,0,0.5);
                animation: fadeIn 0.5s ease-in-out;">

            <div style="font-size: 4.5rem; margin-bottom: 1.5rem;">✅</div>

            <h2 style="color: #f1c40f; margin-top: 0; font-size: 2rem; text-shadow: 0 2px 10px rgba(0,0,0,0.3);">
                ขอบคุณสำหรับคำตอบ!
            </h2>

            <p style="font-size: 1.2rem; opacity: 0.95; line-height: 1.6; margin-bottom: 2rem;">
                ขอให้คุณโชคดีในการสัมภาษณ์
            </p>

            <button onclick="goHome()" style="background: #27ae60; 
                   color: white; 
                   border: none; 
                   padding: 15px 40px; 
                   border-radius: 12px; 
                   cursor: pointer; 
                   font-size: 1.2rem; 
                   font-weight: bold; 
                   transition: 0.3s; 
                   width: 100%;
                   box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4);">
                ตกลง
            </button>
        </div>
    </div>
</body>


</html>
