<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Business Development Assessment - TERA</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
        .exam-container {
            max-width: 850px;
            margin: 2rem auto;
            padding: 1.5rem;
        }

        .q-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            padding: 1.8rem;
            border-radius: 15px;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .q-text {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
            line-height: 1.6;
        }

        .options-grid {
            display: grid;
            gap: 0.8rem;
        }

        .opt-btn {
            display: block;
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
            line-height: 1.4;
            color: white;
            text-align: left;
            font-size: 1rem;
            width: 100%;
        }

        .opt-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #f1c40f;
        }

        .progress-text {
            color: #f1c40f;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: right;
        }
    </style>
</head>
</head>

<body class="page-bg">
    <div class="bg-overlay"></div>
    <div class="exam-container">
        <header style="text-align: center; margin-bottom: 30px; color: white;">
            <img src="./Logo%20Veichi.png" alt="TERA" style="height: 60px;">
            <h1 style="margin-top: 15px;">แบบทดสอบตำแหน่ง แอดมิน / ธุรการสาขา</h1>
            <p id="userInfo" style="opacity: 0.8;"></p>
        </header>

        <div id="questionsContainer">
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzfvCXdieV_wEsn9RUH7icZpeyjSRuZ0AWHO0IUxrmNxkwnp4RE1V3fKA5WnOUo705Xpg/exec";
        const urlParams = new URLSearchParams(window.location.search);

        const userName = urlParams.get('name') || 'ผู้สมัคร';
        const userPos = urlParams.get('position') || 'Branch_Admin';
        const uuid = urlParams.get('uuid') || "no-uuid";
        const questions = [
            { q: "1. หน้าที่หลักของพนักงานธุรการสาขาคือข้อใด?", options: ["ก. การกำหนดกลยุทธ์ระดับมหาภาค", "ข. การซ่อมแซมโครงสร้างพื้นฐานด้วยตนเอง", "ค. การบริหารจัดการงานเอกสาร ข้อมูล และประสานงานสนับสนุน", "ง. การปฏิบัติหน้าที่ขายเพื่อปิดยอดเพียงอย่างเดียว"], ans: 2 },
            { q: "2. หากคุณต้องจัดเก็บเอกสารสำคัญจำนวนมาก คุณควรมีหลักการอย่างไร?", options: ["ก. คัดแยกหมวดหมู่ ติดฉลาก และเรียงตามดัชนีเพื่อการสืบค้น", "ข. วางซ้อนกันตามลำดับบนโต๊ะทำงาน", "ค. จัดเก็บรวมกันเน้นประหยัดเนื้อที่เป็นหลัก", "ง. ทำลายเอกสารทันทีหลังประมวลผล"], ans: 0 },
            { q: "3. เมื่อมีผู้โทรหาผู้จัดการที่ติดประชุมอยู่ คุณควรปฏิบัติอย่างไร?", options: ["ก. ตัดสายทันทีหากไม่เร่งด่วน", "ข. ให้ผู้โทรติดต่อกลับมาใหม่เรื่อยๆ", "ค. ยุติการประชุมทันทีเพื่อแจ้งผู้จัดการ", "ง. บันทึกข้อมูลผู้ติดต่อ (Call Log) และวัตถุประสงค์เพื่อประสานงานภายหลัง"], ans: 3 },
            { q: "4. ทักษะโปรแกรมคอมพิวเตอร์ใดที่จำเป็นที่สุดสำหรับงานธุรการ?", options: ["ก. ชุดโปรแกรมสำนักงาน (Microsoft Office) และ Email", "ข. โปรแกรมตัดต่อวิดีโอความละเอียดสูง", "ค. โปรแกรมออกแบบวิศวกรรม 3 มิติ", "ง. โปรแกรมเขียนชุดคำสั่ง (Coding)"], ans: 0 },
            { q: "5. หากพบว่ารายงานมีตัวเลขผิดพลาดเล็กน้อยก่อนส่งสำนักงานใหญ่ คุณจะทำอย่างไร?", options: ["ก. ปล่อยผ่านหากไม่มีนัยสำคัญ", "ข. ตรวจสอบ Data Integrity และแก้ไขให้ถูกต้องก่อนนำเสนอ", "ค. รายงานว่าเป็นความผิดพลาดของระบบ", "ง. เว้นว่างไว้ให้ผู้อื่นตรวจสอบ"], ans: 1 },
            { q: "6. 'Minute of Meeting' คือเอกสารเกี่ยวกับอะไร?", options: ["ก. เอกสารเรียกเก็บเงินคู่ค้า", "ข. รายงานบันทึกมติที่ประชุม และ Action Plan", "ค. แบบฟอร์มการลางาน", "ง. คู่มือเทคนิคอุปกรณ์ไฟฟ้า"], ans: 1 },
            { q: "7. ในการจัดการ 'Petty Cash' (เงินสดย่อย) สิ่งที่สำคัญที่สุดคือข้อใด?", options: ["ก. ใช้จ่ายส่วนตัวได้หากจำเป็น", "ข. บันทึกบัญชีคุมยอด (Daily Log) พร้อมหลักฐานใบเสร็จครบถ้วน", "ค. จัดสรรตามความพึงพอใจส่วนตัว", "ง. วางเงินไว้ในที่เปิดให้ทุกคนหยิบใช้"], ans: 1 },
            { q: "8. หากพัสดุเร่งด่วนส่งถึงพนักงานที่ลางานอยู่ คุณควรทำอย่างไร?", options: ["ก. ส่งพัสดุคืนผู้ส่งทันที", "ข. เปิดอ่านเนื้อหาภายในทันที", "ค. ประสานงานหัวหน้างานเพื่อพิจารณาความเร่งด่วนตามระเบียบ", "ง. วางทิ้งไว้บนโต๊ะจนกว่าพนักงานจะกลับมา"], ans: 2 },
            { q: "9. ทักษะ 'Prioritization' ช่วยงานแอดมินอย่างไร?", options: ["ก. ช่วยให้ทำ Multitasking โดยไม่เรียงลำดับ", "ข. วิเคราะห์ความสำคัญ/เร่งด่วน (Eisenhower Matrix) เพื่อลดปัญหาคอขวด", "ค. หาเหตุผลในการปฏิเสธงานที่ซับซ้อน", "ง. สร้างอำนาจต่อรองในการสั่งงานต่อ"], ans: 1 },
            { q: "10. การประสานงาน (Coordination) ที่ดีควรเริ่มจากอะไร?", options: ["ก. การสื่อสารที่มีประสิทธิภาพ (Effective Communication)", "ข. การใช้อำนาจบังคับบัญชาสั่งการ", "ค. การใช้อีเมลเพียงทางเดียวเพื่อเป็นหลักฐาน", "ง. การคุยเรื่องส่วนตัวก่อนเข้าเรื่องงานทุกครั้ง"], ans: 0 },
            { q: "11. เมื่อต้องจัดเตรียมห้องประชุม สิ่งใดคือหน้าที่ของแอดมิน?", options: ["ก. ตัดสินใจประเด็นสำคัญแทนผู้จัดการ", "ข. บริหารจัดการทรัพยากร (อุปกรณ์โสตฯ, เอกสาร, อาหารว่าง) ให้พร้อม", "ค. จัดเตรียมอาหารมื้อหลักให้ทุกคนในสาขา", "ง. ทำหน้าที่เป็นประธานในที่ประชุม"], ans: 1 },
            { q: "12. หากมีลูกค้าเดินเข้ามาขณะคุณกำลังทำงานติดพันอยู่ คุณควรทำอย่างไร?", options: ["ก. ทำงานเอกสารให้เสร็จก่อนค่อยคุย", "ข. ไล่ให้ไปหาพนักงานคนอื่น", "ค. แสดงการรับรู้ (Acknowledgment) ทักทาย และประสานผู้เกี่ยวข้องมาดูแล", "ง. ปลีกตัวหนีไปที่อื่น"], ans: 2 },
            { q: "13. การเก็บรักษาความลับของบริษัท (Confidentiality) หมายถึงข้อใด?", options: ["ก. บอกเฉพาะเพื่อนร่วมงานที่สนิท", "ข. เก็บกุญแจและรหัสไว้กับตัวคนเดียว", "ค. คุ้มครองข้อมูลส่วนบุคคลและองค์กรไม่ให้รั่วไหลโดยไม่ได้รับอนุญาต", "ง. ทำลายรหัสผ่านทิ้งทันทีเมื่อย้ายตำแหน่ง"], ans: 2 },
            { q: "14. เครื่องมือ 'Mail Merge' ใน Microsoft Word มีประโยชน์อย่างไร?", options: ["ก. ป้องกันไวรัสในอีเมล", "ข. ผลิตเอกสารจำนวนมากโดยดึงข้อมูลจากฐานข้อมูล", "ค. สร้างระบบตอบกลับอัตโนมัติ", "ง. แปลภาษาเอกสารอัตโนมัติ"], ans: 1 },
            { q: "15. หากอุปกรณ์สำนักงานชำรุด คุณควรจัดการอย่างไร?", options: ["ก. ซ่อมเองตามความเข้าใจ", "ข. ติดป้ายแจ้งสถานะ (Out of Service) และแจ้งซ่อมตาม SOP", "ค. ปล่อยไว้ให้คนอื่นมาเจอเอง", "ง. จัดซื้อเครื่องใหม่มาแทนทันที"], ans: 1 },
            { q: "16. การตรวจสอบ 'Stationery Stock' ควรทำเมื่อใด?", options: ["ก. ตรวจเมื่อมีคนมาแจ้งว่าของหมด", "ข. ตรวจตามรอบที่กำหนด (Cyclic Count) เพื่อวางแผนจัดซื้อ", "ค. ตรวจทุกครั้งที่จะเบิกใช้เอง", "ง. ตรวจเพียงปีละครั้งตอนปิดงบ"], ans: 1 },
            { q: "17. อีเมลที่เป็นทางการ (Professional Email) ควรประกอบด้วยส่วนใด?", options: ["ก. ตัวอักษรหลากสีและภาษาที่เป็นกันเอง", "ข. แนบรูปกิจกรรมส่วนตัว", "ค. หัวข้อชัดเจน คำขึ้นต้นเหมาะสม เนื้อหากระชับ และข้อมูลติดต่อกลับ", "ง. เน้นตัวหนาทั้งอีเมล"], ans: 2 },
            { q: "18. หากคุณทำงานผิดพลาดจนส่งผลกระทบต่อผู้อื่น คุณควรจัดการอย่างไร?", options: ["ก. หลีกเลี่ยงการเผชิญหน้า", "ข. แสดงความรับผิดชอบ (Accountability) และร่วมเสนอทางแก้ไข", "ค. โยนความผิดให้คนในขั้นตอนก่อนหน้า", "ง. ลาออกทันที"], ans: 1 },
            { q: "19. ในงานธุรการ 'Attention to Detail' หมายถึงอะไร?", options: ["ก. มุ่งเน้นงานเสร็จตามเวลาโดยไม่ดูความถูกต้อง", "ข. ความละเอียดลออในการตรวจทานความถูกต้องในทุกขั้นตอน", "ค. การจับผิดเพื่อนร่วมงานเพื่อรายงานหัวหน้า", "ง. การจดจำความลับส่วนตัวของทุกคนในสาขา"], ans: 1 },
            { q: "20. พฤติกรรมใดที่แสดงถึง 'Service Mind' ในงานธุรการ?", options: ["ก. ปฏิเสธงานทุกอย่างที่ไม่อยู่ใน JD", "ข. กระตือรือร้นในการอำนวยความสะดวกและแก้ไขอุปสรรคให้ผู้อื่น", "ค. บริการดีเฉพาะกับผู้บริหาร", "ง. ยิ้มแย้มแต่ไม่ยอมทำงานสนับสนุน"], ans: 1 }
        ];

        let currentStep = 0;
        const userAnswers = [];

        window.onload = function () {
            document.getElementById('userInfo').textContent = `ผู้เข้าสอบ: คุณ ${userName} | ตำแหน่ง: ${userPos}`;
            renderQuestion();
        };

        function renderQuestion() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = "";

            const item = questions[currentStep];
            const card = document.createElement('div');
            card.className = 'q-card';
            card.innerHTML = `
                <div class="progress-text">ข้อที่ ${currentStep + 1} / ${questions.length}</div>
                <p class="q-text">${item.q}</p>
                <div class="options-grid">
                    ${item.options.map((opt, i) => `
                        <button type="button" class="opt-btn" onclick="selectOption(${i})">
                            ${opt}
                        </button>
                    `).join('')}
                </div>`;
            container.appendChild(card);
        }

        async function selectOption(choiceIndex) {
            const item = questions[currentStep];
            userAnswers.push({
                text: item.options[choiceIndex],
                isCorrect: choiceIndex === item.ans
            });

            if (currentStep < questions.length - 1) {
                currentStep++;
                renderQuestion();
            } else {
                await finishExam();
            }
        }

        async function finishExam() {
            const container = document.getElementById('questionsContainer');
            // เปลี่ยน UI ให้ดูนิ่งขึ้นขณะรอ
            container.innerHTML = `
        <div class="q-card" style="text-align:center; padding: 3rem;">
            <div class="spinner" style="border: 4px solid #f3f3f3; border-top: 4px solid #f1c40f; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
            <h2 style="color:#f1c40f;">กำลังบันทึกข้อมูล...</h2>
            <p>กรุณาอย่าปิดหน้าต่างนี้ ระบบกำลังนำส่งคำถามและคำตอบของคุณ</p>
        </div>
        <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>`;

            let score = 0;
            const payload = {
                targetTab: userPos,
                uuid: uuid,
                name: userName,
                position: userPos,
                answersCount: questions.length,
                userAgent: navigator.userAgent
            };

            userAnswers.forEach((ans, i) => {
                if (ans.isCorrect) score++;
                payload[`q${i + 1}_title`] = questions[i].q; // ส่งคำถาม
                payload[`q${i + 1}_text`] = ans.text;        // ส่งคำตอบ
                payload[`q${i + 1}_score`] = ans.isCorrect ? "1" : "0"; // ส่งคะแนน
            });

            payload.totalScore = String(score);
            payload.hrStatus = score >= 14 ? "🟢 ผ่าน (เรียกสัมภาษณ์)" : (score >= 10 ? "🟡 พิจารณาพิเศษ" : "🔴 ไม่ผ่าน");
            payload.decisionNote = score >= 14 ? "เรียกสัมภาษณ์" : (score >= 10 ? "พิจารณา Resume เพิ่มเติม" : "ไม่แนะนำ");

            try {
                const body = new URLSearchParams();
                for (const key in payload) { body.append(key, payload[key]); }

                await fetch(SCRIPT_URL, { method: "POST", body: body, mode: "no-cors" });

                // ✅ เรียกใช้ Modal แทน alert
                document.getElementById('customModal').style.display = 'block';

            } catch (err) {
                console.error(err);
                // ถึงจะ Error แต่ถ้าส่งไปแล้วก็ให้แสดง Modal เพื่อให้คนสอบกลับหน้าแรกได้
                document.getElementById('customModal').style.display = 'block';
            }
        }

        function goHome() {
            window.location.href = "index.html";
        }
    </script>

    <div id="customModal" style="display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; 
           background: transparent; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);">

        <div class="bg-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;">
        </div>

        <div style="background: rgba(255, 255, 255, 0.1); 
                backdrop-filter: blur(15px); 
                -webkit-backdrop-filter: blur(15px);
                color: white; 
                margin: 12% auto; 
                padding: 3rem 2rem; 
                border-radius: 20px; 
                width: 85%; 
                max-width: 450px; 
                text-align: center; 
                border: 1px solid rgba(255, 255, 255, 0.2); 
                box-shadow: 0 20px 50px rgba(0,0,0,0.5);
                animation: fadeIn 0.5s ease-in-out;">

            <div style="font-size: 4.5rem; margin-bottom: 1.5rem;">✅</div>

            <h2 style="color: #f1c40f; margin-top: 0; font-size: 2rem; text-shadow: 0 2px 10px rgba(0,0,0,0.3);">
                ขอบคุณสำหรับคำตอบ!
            </h2>

            <p style="font-size: 1.2rem; opacity: 0.95; line-height: 1.6; margin-bottom: 2rem;">
                ขอให้คุณโชคดีในการสัมภาษณ์
            </p>

            <button onclick="goHome()" style="background: #27ae60; 
                   color: white; 
                   border: none; 
                   padding: 15px 40px; 
                   border-radius: 12px; 
                   cursor: pointer; 
                   font-size: 1.2rem; 
                   font-weight: bold; 
                   transition: 0.3s; 
                   width: 100%;
                   box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4);">
                ตกลง
            </button>
        </div>
    </div>
</body>


</html>
