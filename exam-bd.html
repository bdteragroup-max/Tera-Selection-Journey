<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Business Development Assessment - TERA</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
        .exam-container {
            max-width: 850px;
            margin: 2rem auto;
            padding: 1.5rem;
        }

        .q-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            padding: 1.8rem;
            border-radius: 15px;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .q-text {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
            line-height: 1.6;
        }

        .options-grid {
            display: grid;
            gap: 0.8rem;
        }

        .opt-btn {
            display: block;
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
            line-height: 1.4;
            color: white;
            text-align: left;
            font-size: 1rem;
            width: 100%;
        }

        .opt-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #f1c40f;
        }

        .progress-text {
            color: #f1c40f;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: right;
        }
    </style>
</head>

<body class="page-bg">
    <div class="bg-overlay"></div>
    <div class="exam-container">
        <header style="text-align: center; margin-bottom: 30px; color: white;">
            <img src="./Logo%20Veichi.png" alt="TERA" style="height: 60px;">
            <h1 style="margin-top: 15px;">แบบทดสอบตำแหน่ง Business Development (BD)</h1>
            <p id="userInfo" style="opacity: 0.8;"></p>
        </header>

        <div id="questionsContainer">
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzfvCXdieV_wEsn9RUH7icZpeyjSRuZ0AWHO0IUxrmNxkwnp4RE1V3fKA5WnOUo705Xpg/exec";
        const urlParams = new URLSearchParams(window.location.search);

        const userName = urlParams.get('name') || 'ผู้สมัคร';
        const userPos = urlParams.get('position') || 'Developer';
        const uuid = urlParams.get('uuid') || "no-uuid";

        const questions = [
            { q: "1. เป้าหมายหลักของตำแหน่ง Business Development (BD) คืออะไร?", options: ["ก. โฟกัสความถูกต้องของเอกสารภายในและงานธุรการ", "ข. สร้างการเติบโตระยะยาวด้วยตลาดใหม่ ลูกค้าใหม่ และพันธมิตรเชิงกลยุทธ์", "ค. ดูแลหลังการขายเชิงเทคนิคและวางแผนบำรุงรักษา", "ง. กำกับระเบียบวินัยบุคลากรและจัดการบทลงโทษ"], ans: 1 },
            { q: "2. การวิเคราะห์ SWOT Analysis เครื่องมือใดที่ใช้ประเมิน 'ปัจจัยภายนอก' ที่ควบคุมไม่ได้?", options: ["ก. Strengths และ Weaknesses", "ข. Opportunities และ Threats", "ค. Strengths และ Opportunities", "ง. Weaknesses และ Threats"], ans: 1 },
            { q: "3. หากคุณต้องขยายธุรกิจไปยังตลาดใหม่ที่มีคู่แข่งเจ้าถิ่นแข็งแกร่งมาก สิ่งแรกที่ควรทำคือ?", options: ["ก. ออกโปรโมชันลดราคาต่ำกว่าตลาดทันที", "ข. ลงทุนเปิดสาขาหลายจุดเพื่อยึดพื้นที่", "ค. ทำ Market Research หาช่องว่าง/ปัญหาที่คู่แข่งตอบไม่ดี แล้วออกแบบ Entry Strategy", "ง. เพิ่มงบการตลาดมากกว่าคู่แข่งสองเท่า"], ans: 2 },
            { q: "4. 'Sales' กับ 'Business Development' มีความแตกต่างกันอย่างไรมากที่สุด?", options: ["ก. Sales เน้นปิดดีลระยะสั้น ส่วน BD เน้นสร้างโอกาสเชิงกลยุทธ์และรายได้ยั่งยืน", "ข. Sales ทำงานภาคสนาม ส่วน BD ทำงานออฟฟิศเท่านั้น", "ค. Sales เน้นเอกสาร ส่วน BD เน้นขายอย่างเดียว", "ง. ทั้งสองเหมือนกันทุกอย่าง"], ans: 0 },
            { q: "5. เมื่อต้องไปนำเสนอแผนงาน (Pitching) กับลูกค้าแต่มีเวลาเพียง 5 นาที คุณควรเน้นส่วนใด?", options: ["ก. เล่าประวัติองค์กรและรางวัลที่เคยได้รับอย่างละเอียด", "ข. Value Proposition ที่แก้ Pain Point ชัดเจน พร้อมผลลัพธ์ที่วัดได้ (ROI)", "ค. อธิบายโครงสร้างผู้บริหารและทีมงานทุกฝ่ายให้ครบ", "ง. เจาะรายละเอียดเทคนิคเชิงลึกเพื่อแสดงความเชี่ยวชาญ"], ans: 1 },
            { q: "6. Lead Generation หมายถึงอะไรในบริบทของ BD?", options: ["ก. กระบวนการค้นหาและคัดกรองผู้มุ่งหวังเพื่อเติม Pipeline", "ข. การปลดพนักงานที่ทำยอดไม่ได้ตามเป้า", "ค. การผลิตสินค้าให้ได้จำนวนมากที่สุดในเวลาสั้น", "ง. การส่งรายงานประชุมให้หัวหน้าเพื่อเป็นหลักฐาน"], ans: 0 },
            { q: "7. หากพันธมิตรทางธุรกิจ (Partner) ขอยกเลิกสัญญากะทันหัน คุณควรจัดการอย่างไร?", options: ["ก. ฟ้องร้องทันทีเพื่อรักษาสิทธิ์", "ข. ปล่อยโครงการไว้ก่อนรอให้สถานการณ์ชัดเจน", "ค. ปกปิดเรื่องนี้ไม่ให้ผู้บริหารทราบ", "ง. หาสาเหตุอย่างเป็นระบบ เจรจา Win-Win ถ้าไม่ได้ให้ใช้แผนสำรองทันที"], ans: 3 },
            { q: "8. 'B2B' แตกต่างจาก 'B2C' อย่างไร?", options: ["ก. B2B ขายให้บุคคลทั่วไป ส่วน B2C ขายให้รัฐ", "ข. B2B มีวงจรตัดสินใจยาวกว่า มีผู้เกี่ยวข้องหลายฝ่าย และเน้นเหตุผลทางธุรกิจ/ROI", "ค. B2B ใช้อินฟลูเอนเซอร์ ส่วน B2C ต้องพึ่งสัญญา", "ง. B2B ไม่จำเป็นต้องทำสัญญา"], ans: 1 },
            { q: "9. KPI ที่เหมาะสมที่สุดสำหรับสายงาน BD คือข้อใด?", options: ["ก. จำนวน Qualified Leads, มูลค่า Pipeline และจำนวนพันธมิตรเชิงกลยุทธ์", "ข. จำนวนครั้งที่มาทำงานสายต่อเดือน", "ค. จำนวนอีเมลที่ส่งในแต่ละวัน", "ง. ความเร็วในการพิมพ์รายงาน"], ans: 0 },
            { q: "10. คำว่า 'Value Proposition' หมายถึงอะไร?", options: ["ก. การตั้งราคาถูกที่สุดในตลาด", "ข. งบประมาณการโฆษณาที่ใช้ทั้งหมด", "ค. มูลค่าทรัพย์สินทั้งหมดของบริษัท", "ง. คุณค่าหลักที่ลูกค้าจะได้รับเมื่อเลือกเรา และความแตกต่างจากคู่แข่ง"], ans: 3 },
            { q: "11. ในการเจรจาต่อรอง 'BATNA' หมายถึงอะไร?", options: ["ก. ทางเลือกที่ดีที่สุดที่ยังทำได้หากการเจรจาปัจจุบันล้มเหลว", "ข. การยอมทุกเงื่อนไขเพื่อให้ปิดดีลได้", "ค. การยื่นข้อเสนอเกินจริงเพื่อกดดันอีกฝ่าย", "ง. การใช้อำนาจบังคับให้คู่สัญญาเซ็นชื่อ"], ans: 0 },
            { q: "12. หากยอดขายในไตรมาสนี้ลดลง 20% ในฐานะ BD คุณควรทำอย่างไร?", options: ["ก. ลดเงินเดือนพนักงานเพื่อคุมต้นทุน", "ข. ทำ Data Analytics วิเคราะห์คอขวด แล้วเสนอแผนสร้าง Pipeline ใหม่", "ค. รอให้เศรษฐกิจดีขึ้นเองในไตรมาสหน้า", "ง. เปลี่ยนโลโก้และภาพลักษณ์ใหม่ทันที"], ans: 1 },
            { q: "13. การเข้าหาลูกค้าแบบ 'Cold Calling' คืออะไร?", options: ["ก. โโทรหาคนรู้จักเพื่อขอรายชื่อแนะนำ", "ข. ส่งอีเมลทวงหนี้ลูกค้าที่ค้างชำระ", "ค. การโทรหาผู้มุ่งหวังที่ยังไม่เคยมีสัมพันธ์มาก่อนเพื่อเปิดโอกาสธุรกิจ", "ง. นัดประชุมในห้องที่อุณหภูมิต่ำเพื่อให้ตื่นตัว"], ans: 2 },
            { q: "14. Strategic Partnership คือการสร้างความสัมพันธ์แบบใด?", options: ["ก. การจ้าง Outsource ทำงานแทนทั้งหมด", "ข. การแลกเปลี่ยนพนักงานกันทำงานชั่วคราว", "ค. การเข้าซื้อกิจการคู่แข่งเพื่อผูกขาด", "ง. ความร่วมมือเชิงกลยุทธ์ที่เสริมจุดแข็งและสร้างคุณค่าใหม่ร่วมกัน"], ans: 3 },
            { q: "15. ในการวิเคราะห์คู่แข่ง (Competitor Analysis) ข้อใดสำคัญที่สุด?", options: ["ก. ยี่ห้อรถของทีมขายคู่แข่ง", "ข. Positioning, จุดแข็ง-จุดอ่อน, กลยุทธ์ราคา และช่องทางหาลูกค้า", "ค. จำนวนต้นไม้ในออฟฟิศคู่แข่ง", "ง. ชื่อเล่นของผู้บริหารคู่แข่ง"], ans: 1 },
            { q: "16. หากต้องเสนอโครงการให้ผู้บริหารระดับสูง (C-Level) คุณควรทำอย่างไร?", options: ["ก. ใส่ข้อมูลละเอียดที่สุดหลายร้อยหน้า", "ข. ทำสไลด์จำนวนมากเพื่อโชว์ความตั้งใจ", "ค. เน้น Executive Summary, ROI, ความเสี่ยง และทางเลือกตัดสินใจ", "ง. เน้นเล่าประวัติส่วนตัวผู้นำเสนอ"], ans: 2 },
            { q: "17. Market Penetration คือกลยุทธ์แบบใด?", options: ["ก. ขายสินค้าเดิมในตลาดเดิม แต่เพิ่มส่วนแบ่งด้วยการเพิ่มการเข้าถึง", "ข. เลิกขายสินค้าเดิมแล้วสร้างสินค้าใหม่ทั้งหมด", "ค. ย้ายสำนักงานใหญ่ไปต่างประเทศ", "ง. ลดจำนวนพนักงานขายลงครึ่งหนึ่งเพื่อคุมงบ"], ans: 0 },
            { q: "18. ทักษะ 'Active Listening' สำคัญอย่างไรกับ BD?", options: ["ก. ช่วยให้ฟังวิทยุได้นานขึ้นลดความเครียด", "ข. ช่วยให้พูดแทรกคู่สนทนาได้ตลอดเพื่อคุมเกม", "ค. ช่วยให้จำชื่อลูกค้าได้แม่นยำขึ้นเท่านั้น", "ง. ช่วยจับ Pain Point จริง และสัญญาณความเสี่ยงเพื่อออกแบบข้อเสนอได้ตรงจุด"], ans: 3 },
            { q: "19. CRM Software มีประโยชน์อย่างไรต่อ BD?", options: ["ก. ใช้ออกแบบกราฟิกสื่อโฆษณา", "ข. ใช้จัดการข้อมูลลูกค้า ติดตาม Pipeline และทำ Forecast ยอดขาย", "ค. ใช้คำนวณเงินเดือนพนักงาน", "ง. ใช้จองตั๋วเครื่องบินและที่พัก"], ans: 1 },
            { q: "20. หากบริษัทต้องการเป็น 'ผู้นำด้านนวัตกรรม' BD ควรโฟกัสสิ่งใด?", options: ["ก. เน้นขายของตกรุ่นราคาถูกเพื่อระบายสต๊อก", "ข. ลดงบวิจัยและพัฒนาเพื่อประหยัดเงิน", "ค. หา Partner/เทคโนโลยีใหม่ สร้าง Use Case และแผน Go-to-Market", "ง. ทำงานแบบเดิมไม่เปลี่ยนกระบวนการ"], ans: 2 }
        ];

        let currentStep = 0;
        const userAnswers = [];

        window.onload = function () {
            document.getElementById('userInfo').textContent = `ผู้เข้าสอบ: คุณ ${userName} | ตำแหน่ง: ${userPos}`;
            renderQuestion();
        };

        function renderQuestion() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = "";

            const item = questions[currentStep];
            const card = document.createElement('div');
            card.className = 'q-card';
            card.innerHTML = `
                <div class="progress-text">ข้อที่ ${currentStep + 1} / ${questions.length}</div>
                <p class="q-text">${item.q}</p>
                <div class="options-grid">
                    ${item.options.map((opt, i) => `
                        <button type="button" class="opt-btn" onclick="selectOption(${i})">
                            ${opt}
                        </button>
                    `).join('')}
                </div>`;
            container.appendChild(card);
        }

        async function selectOption(choiceIndex) {
            const item = questions[currentStep];
            userAnswers.push({
                text: item.options[choiceIndex],
                isCorrect: choiceIndex === item.ans
            });

            if (currentStep < questions.length - 1) {
                currentStep++;
                renderQuestion();
            } else {
                await finishExam();
            }
        }

        async function finishExam() {
            const container = document.getElementById('questionsContainer');
            // เปลี่ยน UI ให้ดูนิ่งขึ้นขณะรอ
            container.innerHTML = `
        <div class="q-card" style="text-align:center; padding: 3rem;">
            <div class="spinner" style="border: 4px solid #f3f3f3; border-top: 4px solid #f1c40f; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
            <h2 style="color:#f1c40f;">กำลังบันทึกข้อมูล...</h2>
            <p>กรุณาอย่าปิดหน้าต่างนี้ ระบบกำลังนำส่งคำถามและคำตอบของคุณ</p>
        </div>
        <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>`;

            let score = 0;
            const payload = {
                targetTab: userPos,
                uuid: uuid,
                name: userName,
                position: userPos,
                answersCount: questions.length,
                userAgent: navigator.userAgent
            };

            userAnswers.forEach((ans, i) => {
                if (ans.isCorrect) score++;
                payload[`q${i + 1}_title`] = questions[i].q; // ส่งคำถาม
                payload[`q${i + 1}_text`] = ans.text;        // ส่งคำตอบ
                payload[`q${i + 1}_score`] = ans.isCorrect ? "1" : "0"; // ส่งคะแนน
            });

            payload.totalScore = String(score);
            payload.hrStatus = score >= 14 ? "🟢 ผ่าน (เรียกสัมภาษณ์)" : (score >= 10 ? "🟡 พิจารณาพิเศษ" : "🔴 ไม่ผ่าน");
            payload.decisionNote = score >= 14 ? "เรียกสัมภาษณ์" : (score >= 10 ? "พิจารณา Resume เพิ่มเติม" : "ไม่แนะนำ");

            try {
                const body = new URLSearchParams();
                for (const key in payload) { body.append(key, payload[key]); }

                await fetch(SCRIPT_URL, { method: "POST", body: body, mode: "no-cors" });

                // ✅ เรียกใช้ Modal แทน alert
                document.getElementById('customModal').style.display = 'block';

            } catch (err) {
                console.error(err);
                // ถึงจะ Error แต่ถ้าส่งไปแล้วก็ให้แสดง Modal เพื่อให้คนสอบกลับหน้าแรกได้
                document.getElementById('customModal').style.display = 'block';
            }
        }

        function goHome() {
            window.location.href = "index.html";
        }
    </script>

    <div id="customModal" style="display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; 
           background: transparent; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);">

        <div class="bg-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;">
        </div>

        <div style="background: rgba(255, 255, 255, 0.1); 
                backdrop-filter: blur(15px); 
                -webkit-backdrop-filter: blur(15px);
                color: white; 
                margin: 12% auto; 
                padding: 3rem 2rem; 
                border-radius: 20px; 
                width: 85%; 
                max-width: 450px; 
                text-align: center; 
                border: 1px solid rgba(255, 255, 255, 0.2); 
                box-shadow: 0 20px 50px rgba(0,0,0,0.5);
                animation: fadeIn 0.5s ease-in-out;">

            <div style="font-size: 4.5rem; margin-bottom: 1.5rem;">✅</div>

            <h2 style="color: #f1c40f; margin-top: 0; font-size: 2rem; text-shadow: 0 2px 10px rgba(0,0,0,0.3);">
                ขอบคุณสำหรับคำตอบ!
            </h2>

            <p style="font-size: 1.2rem; opacity: 0.95; line-height: 1.6; margin-bottom: 2rem;">
                ขอให้คุณโชคดีในการสัมภาษณ์
            </p>

            <button onclick="goHome()" style="background: #27ae60; 
                   color: white; 
                   border: none; 
                   padding: 15px 40px; 
                   border-radius: 12px; 
                   cursor: pointer; 
                   font-size: 1.2rem; 
                   font-weight: bold; 
                   transition: 0.3s; 
                   width: 100%;
                   box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4);">
                ตกลง
            </button>
        </div>
