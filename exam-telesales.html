        }

                opacity: 1;

            }
        }

            font-weight: 600;
            margin-bottom: 1.5rem;

            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            text-align: left;
            font-size: 1.05rem;
            width: 100%;
        }

        .opt-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: #f1c40f;
        }

        .progress-text {
            color: #fff;
            opacity: 0.6;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: right;
        }

            font-weight: 600;
            color: rgba(241, 196, 15, 0.7);
            margin-bottom: 0.6rem;
            letter-spacing: 0.03em;

            top: 16px;
            right: 16px;
            z-index: 9000;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.35);

                qEn: "16. A customer hesitates and says 'I need to consult my partner first.' How should you handle this?",
                options: ["ก. ตอบรับอย่างเข้าใจ แล้วทำให้การปรึกษามีกรอบ", "ข. ขอส่งใบเสนอราคาให้ทั้งคู่ดูตรงกัน", "ค. เปลี่ยนจากการตัดสินใจ เป็นการยืนยันเงื่อนไขจองสิทธิ์", "ง. เร่งปิดด้วยแรงกดดันว่าโปรจะหมดวันนี้"],
                optionsEn: ["A. Acknowledge empathetically and then give the consultation a clear framework.", "B. Offer to send a quotation for both of them to review together.", "C. Shift the conversation from a final decision to confirming a reservation or holding terms.", "D. Apply pressure by saying the promotion expires today."],
                cat: null, catEn: null,
                ans: 2
            },
            {
                q: "17. หากคุณโทรไปผิดจังหวะ เช่น ลูกค้ากำลังขับรถหรือติดประชุม คุณควรทำอย่างไร?",
                qEn: "17. If you call at a bad time (e.g. the customer is driving or in a meeting), what should you do?",
                options: ["ก. พยายามคุยต่อแบบย่นย่อที่สุด", "ข. เคารพความปลอดภัยและเวลา โดยขอโทรกลับในเวลาที่นัดหมาย", "ค. ขอให้ลูกค้าหยุดขับรถสักครู่เพื่อคุยเรื่องสำคัญ", "ง. เปลี่ยนช่องทางไปส่งข้อความสรุปแทนทันที"],
                optionsEn: ["A. Try to condense the conversation as much as possible and continue.", "B. Respect their safety and time by requesting to call back at a mutually agreed time.", "C. Ask the customer to pull over briefly to discuss something important.", "D. Immediately switch channels and send a summary message instead."],
                cat: null, catEn: null,
                ans: 1
            },
            {
                q: "18. ลูกค้าเปรียบเทียบว่า 'เจ้าอื่นแถมเยอะกว่า' คุณควรตอบอย่างไร?",
                qEn: "18. A customer says 'Another company offers more freebies.' How should you respond?",
                options: ["ก. โจมตีคู่แข่งว่าของแถมคุณภาพไม่ดี", "ข. เสนอแพ็กเกจเทียบเคียงอย่างมีเงื่อนไขให้เลือก", "ค. ยอมรับและคัดกรองให้ชัดว่าลูกค้าให้ค่าน้ำหนักเรื่องไหน", "ง. รีเฟรมจากของแถม เป็นมูลค่ารวมและความเสี่ยง"],
                optionsEn: ["A. Attack the competitor by saying their freebies are low quality.", "B. Offer a comparable package with conditional options for the customer to choose from.", "C. Acknowledge it and clarify what the customer values most.", "D. Reframe the conversation from freebies to total value and risk."],
                cat: null, catEn: null,
                ans: 1
            },
            {
                q: "19. เมื่อเจอคำถามที่ลูกค้าพยายาม 'ลองภูมิ' หรือถามจิกกัด คุณควรทำอย่างไร?",
                qEn: "19. When a customer tries to test you or asks a provocative question, what should you do?",
                options: ["ก. สู้กลับให้ชนะเพื่อให้รู้ว่าเราไม่ยอม", "ข. รักษาความนิ่ง ตอบด้วยข้อเท็จจริง และใช้คำถามคุมทิศทาง", "ค. ใช้เทคนิค Agree-Clarify-Answer", "ง. ยอมรับอย่างมืออาชีพและวางกรอบการสนทนา"],
                optionsEn: ["A. Fight back to win and show you won't be pushed around.", "B. Stay calm, respond with facts, and use questions to steer the direction.", "C. Use the Agree-Clarify-Answer technique.", "D. Acknowledge professionally and set the conversational frame."],
                cat: null, catEn: null,
                ans: 1
            },
            {
                q: "20. เป้าหมายสูงสุดของการแก้ปัญหาเฉพาะหน้าในงาน Telesales คืออะไร?",
                qEn: "20. What is the ultimate goal of on-the-spot problem solving in Telesales?",
                options: ["ก. ปิดการขายให้ได้ในสายเดียว", "ข. ทำให้ลูกค้าอารมณ์ดีขึ้นเป็นหลัก", "ค. รักษาความไว้วางใจและพาไปสู่ขั้นตอนถัดไป (Next Step)", "ง. เอาชนะข้อโต้แย้งลูกค้าให้ได้"],
                optionsEn: ["A. Close the sale within a single call.", "B. Primarily make the customer feel good.", "C. Preserve trust and guide the customer to the next step.", "D. Win every objection the customer raises."],
                cat: null, catEn: null,
                ans: 2
            }
        ];

        /* ============================================================
           App State
        ============================================================ */
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzyEfYLPui1hVutBVgvKXUV2pUSI5th8A8IAO75QRc_ZK1ia1lgoqNkbDZFwNhyncBj/exec";
        const urlParams = new URLSearchParams(window.location.search);
        const userName = urlParams.get('name') || 'ผู้สมัคร';
        const userPos = urlParams.get('position') || 'TeleSales';
        const uuid = urlParams.get('uuid') || 'no-uuid';

        let currentStep = 0;
        const userAnswers = [];

        /* ============================================================
           Language helpers
        ============================================================ */
        function applyLang(lang) {
            currentLang = lang;
            const t = ui[lang];
            document.getElementById('langToggle').textContent = t.langBtn;
            document.getElementById('pageTitle').textContent = t.pageTitle;
            document.getElementById('userInfo').textContent = t.userInfo(userName, userPos);
            renderQuestion();
        }

        document.getElementById('langToggle').addEventListener('click', () => {
            applyLang(currentLang === 'th' ? 'en' : 'th');
        });

        /* ============================================================
           Render
        ============================================================ */
        window.onload = () => {
            document.getElementById('userInfo').textContent = ui[currentLang].userInfo(userName, userPos);
            renderQuestion();
        };

        function renderQuestion() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = "";
            const item = questions[currentStep];
            const t = ui[currentLang];

            const questionText = (currentLang === 'en' && item.qEn) ? item.qEn : item.q;
            const opts = (currentLang === 'en' && item.optionsEn) ? item.optionsEn : item.options;
            const catLabel = currentLang === 'en' ? item.catEn : item.cat;

            const card = document.createElement('div');
            card.className = 'q-card';
            card.innerHTML = `
                <div class="progress-text">${t.progress(currentStep + 1, questions.length)}</div>
                ${catLabel ? `<div class="cat-label">📂 ${catLabel}</div>` : ''}
                <p class="q-text">${questionText}</p>
                <div class="options-grid">
                    ${opts.map((opt, i) => `
                        <button type="button" class="opt-btn" onclick="selectOption(${i})">${opt}</button>
                    `).join('')}
                </div>`;
            container.appendChild(card);
        }

        /* ============================================================
           Logic
        ============================================================ */
        async function selectOption(choiceIndex) {
            const item = questions[currentStep];
            userAnswers.push({
                text: item.options[choiceIndex],
                isCorrect: choiceIndex === item.ans
            });

            if (currentStep < questions.length - 1) {
                currentStep++;
                renderQuestion();
            } else {
                await finishExam();
            }
        }

        async function finishExam() {
            const t = ui[currentLang];
            const container = document.getElementById('questionsContainer');
            container.innerHTML = `
                <div class="q-card" style="text-align:center; padding: 4rem 2rem;">
                    <div style="border: 5px solid rgba(255,255,255,0.1); border-top: 5px solid #f1c40f; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 25px;"></div>
                    <h2 style="color:#f1c40f;">${t.saving}</h2>
                    <p style="opacity:0.8;">${t.savingDesc}</p>
                </div>
                <style>@keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }</style>`;

            let score = 0;
            const payload = {
                targetTab: userPos,
                uuid: uuid,
                name: userName,
                position: userPos,
                answersCount: questions.length,
                userAgent: navigator.userAgent
            };

            userAnswers.forEach((ans, i) => {
                if (ans.isCorrect) score++;
                payload[`q${i + 1}_title`] = questions[i].q;
                payload[`q${i + 1}_text`] = ans.text;
                payload[`q${i + 1}_score`] = ans.isCorrect ? "1" : "0";
            });

            payload.totalScore = String(score);
            payload.hrStatus = score >= 14 ? "🟢 ผ่าน (เรียกสัมภาษณ์)" : (score >= 10 ? "🟡 พิจารณาพิเศษ" : "🔴 ไม่ผ่าน");
            payload.decisionNote = score >= 14 ? "เรียกสัมภาษณ์" : (score >= 10 ? "พิจารณา Resume เพิ่มเติม" : "ไม่แนะนำ");

            document.getElementById('modalTitle').textContent = t.modalTitle;
            document.getElementById('modalDesc').textContent = t.modalDesc;
            document.getElementById('modalBtn').textContent = t.modalBtn;

            try {
                const body = new URLSearchParams();
                for (const key in payload) { body.append(key, payload[key]); }
                await fetch(SCRIPT_URL, { method: "POST", body: body, mode: "no-cors" });
                document.getElementById('customModal').style.display = 'block';
            } catch (err) {
                console.error(err);
                document.getElementById('customModal').style.display = 'block';
            }
        }

        function goHome() {
            window.location.href = "index.html";
        }
    </script>

    <!-- Modal -->
    <div id="customModal" style="display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%;
           background: transparent; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);">
        <div class="bg-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;">
        </div>
        <div style="background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
                color: white; margin: 12% auto; padding: 3rem 2rem; border-radius: 20px; width: 85%; max-width: 450px;
                text-align: center; border: 1px solid rgba(255,255,255,0.2);
                box-shadow: 0 20px 50px rgba(0,0,0,0.5); animation: fadeIn 0.5s ease-in-out;">
            <div style="font-size: 4.5rem; margin-bottom: 1.5rem;">✅</div>
            <h2 id="modalTitle"
                style="color: #f1c40f; margin-top: 0; font-size: 2rem; text-shadow: 0 2px 10px rgba(0,0,0,0.3);">
                ขอบคุณสำหรับคำตอบ!</h2>
            <p id="modalDesc" style="font-size: 1.2rem; opacity: 0.95; line-height: 1.6; margin-bottom: 2rem;">
                ขอให้คุณโชคดีในการสัมภาษณ์</p>
            <button id="modalBtn" onclick="goHome()" style="background: #27ae60; color: white; border: none;
                   padding: 15px 40px; border-radius: 12px; cursor: pointer; font-size: 1.2rem;
                   font-weight: bold; transition: 0.3s; width: 100%;
                   box-shadow: 0 5px 15px rgba(39,174,96,0.4);">ตกลง</button>
        </div>
    </div>
</body>

</html>
