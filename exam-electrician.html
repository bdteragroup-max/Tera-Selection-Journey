<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Business Development Assessment - TERA</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
        .exam-container {
            max-width: 850px;
            margin: 2rem auto;
            padding: 1.5rem;
        }

        .q-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            padding: 1.8rem;
            border-radius: 15px;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .q-text {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
            line-height: 1.6;
        }

        .options-grid {
            display: grid;
            gap: 0.8rem;
        }

        .opt-btn {
            display: block;
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
            line-height: 1.4;
            color: white;
            text-align: left;
            font-size: 1rem;
            width: 100%;
        }

        .opt-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #f1c40f;
        }

        .progress-text {
            color: #f1c40f;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: right;
        }
    </style>
</head>

<body class="page-bg">
    <div class="bg-overlay"></div>
    <div class="exam-container">
        <header style="text-align: center; margin-bottom: 30px; color: white;">
            <img src="./Logo%20Veichi.png" alt="TERA" style="height: 60px;">
            <h1 style="margin-top: 15px;">แบบทดสอบตำแหน่ง ช่างไฟฟ้า / วิศวกรไฟฟ้า</h1>
            <p id="userInfo" style="opacity: 0.8;"></p>
        </header>

        <div id="questionsContainer">
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzfvCXdieV_wEsn9RUH7icZpeyjSRuZ0AWHO0IUxrmNxkwnp4RE1V3fKA5WnOUo705Xpg/exec";
        const urlParams = new URLSearchParams(window.location.search);

        const userName = urlParams.get('name') || 'ผู้สมัคร';
        const userPos = urlParams.get('position') || 'Technician';
        const uuid = urlParams.get('uuid') || "no-uuid";
        const questions = [
            { q: "1. อุปกรณ์ชนิดใดมีหน้าที่ป้องกันกระแสไฟฟ้ารั่วและตัดวงจรเพื่อความปลอดภัยของชีวิต?", options: ["ก. MCCB ที่มีฟังก์ชัน Magnetic Trip", "ข. RCBO ที่ตรวจจับกระแสไม่สมดุลระหว่าง Line และ Neutral", "ค. Overload Relay ที่ติดตั้งหลัง Contactor", "ง. Surge Protector แบบ Type 2"], ans: 1 },
            { q: "2. ตามมาตรฐาน วสท. สายเส้นไฟ (Phase), สายนิวทรัล (Neutral) และสายดิน (Ground) ในระบบไฟ 1 เฟส ควรใช้สีอะไรตามลำดับ?", options: ["ก. ดำ, ขาว, เขียว", "ข. น้ำตาล, ฟ้า, เขียวแถบเหลือง", "ค. แดง, ดำ, เทา", "ง. น้ำเงิน, เทา, เขียว"], ans: 1 },
            { q: "3. หากคุณพบว่าเบรกเกอร์ทริป (Trip) ทันทีที่สับสวิตช์เปิดเครื่องจักร สิ่งแรกที่ควรตรวจสอบคืออะไร?", options: ["ก. ขนาดเบรกเกอร์ต่ำกว่ากำลังมอเตอร์", "ข. การลัดวงจรในโหลดหรือสายไฟ", "ค. ค่า Inrush Current ของมอเตอร์", "ง. แรงดันไฟตกจากหม้อแปลง"], ans: 1 },
            { q: "4. เครื่องมือชนิดใดใช้สำหรับวัดความต้านทานฉนวนของสายไฟหรือมอเตอร์?", options: ["ก. True RMS Multimeter", "ข. Clamp Meter", "ค. Insulation Resistance Tester (Megger)", "ง. Earth Tester"], ans: 2 },
            { q: "5. การต่อสายดิน (Grounding) มีจุดประสงค์หลักเพื่ออะไร?", options: ["ก. ทำให้แรงดันระบบเสถียร", "ข. สร้างทางเดินกระแสผิดปกติลงดินเพื่อให้ Protective Device ทำงาน", "ค. ลดสัญญาณรบกวนในระบบ", "ง. ป้องกันไฟกระชาก"], ans: 1 },
            { q: "6. ในการทำงานกับตู้ควบคุมไฟฟ้า ข้อใดคือขั้นตอนความปลอดภัยที่สำคัญที่สุดก่อนเริ่มงาน?", options: ["ก. ใส่ถุงมือยาง", "ข. ทำ LOTO และตรวจสอบว่าไม่มีไฟด้วยเครื่องมือวัด", "ค. ปิดเมนเบรกเกอร์", "ง. ติดป้ายเตือน"], ans: 1 },
            { q: "7. หากต้องการวัดกระแสไฟฟ้า (Ampere) ในสายไฟเส้นเดียวขณะเครื่องจักรทำงาน ควรใช้เครื่องมือใดสะดวกที่สุด?", options: ["ก. Digital Multimeter ต่ออนุกรม", "ข. Clamp Meter", "ค. Current Transformer", "ง. Power Analyzer"], ans: 1 },
            { q: "8. Overload Relay มีหน้าที่อะไรในวงจรควบคุมมอเตอร์?", options: ["ก. ป้องกันไฟลัดวงจร", "ข. ป้องกันมอเตอร์ร้อนเกินจาก Overcurrent ต่อเนื่อง", "ค. ป้องกันไฟตก", "ง. หน่วงเวลาการสตาร์ท"], ans: 1 },
            { q: "9. ขนาดของเซอร์กิตเบรกเกอร์ (Circuit Breaker) ควรสัมพันธ์กับสิ่งใดมากที่สุด?", options: ["ก. กำลังโหลด", "ข. ขนาดสายไฟ", "ค. กระแส Short Circuit ของระบบ", "ง. ทั้งข้อ ก และ ข"], ans: 3 },
            { q: "10. การติดตั้งเต้ารับ (Plug) ในห้องน้ำหรือพื้นที่เปียกชื้น ต้องใช้ร่วมกับอุปกรณ์ใดเสมอ?", options: ["ก. Isolator", "ข. RCBO / RCD", "ค. SPD", "ง. Fuse"], ans: 1 },
            { q: "11. สัญลักษณ์ 'L' และ 'N' บนขั้วต่อไฟฟ้าหมายถึงอะไร?", options: ["ก. Line และ Neutral", "ข. Live และ Node", "ค. Load และ Neutral", "ง. Line และ Node"], ans: 0 },
            { q: "12. หากมอเตอร์ 3 เฟส ทำงานแล้วมีเสียงครางและไม่หมุน (Single Phasing) สาเหตุส่วนใหญ่มักเกิดจากอะไร?", options: ["ก. แรงดันเกิน", "ข. ไฟขาด 1 เฟส", "ค. แบริ่งฝืด", "ง. โหลดเกิน"], ans: 1 },
            { q: "13. การอ่านแบบไฟฟ้า สัญลักษณ์วงกลมที่มีเส้นขีดกากบาทข้างใน (X) มักหมายถึงอะไร?", options: ["ก. เต้ารับ", "ข. โคมไฟ", "ค. สวิตช์", "ง. Motor Outlet"], ans: 1 },
            { q: "14. ในการเดินสายไฟในท่อร้อยสาย (Conduit) ห้ามกระทำการใดเด็ดขาด?", options: ["ก. ใช้ท่อ PVC ในโรงงาน", "ข. ร้อยสายเกินพิกัดท่อ", "ค. ใช้สาย THW", "ง. เดินสายร่วมกราวด์"], ans: 1 },
            { q: "15. หน่วยวัดความสามารถในการต้านทานไฟฟ้าคืออะไร?", options: ["ก. Volt", "ข. Ampere", "ค. Ohm", "ง. Watt"], ans: 2 },
            { q: "16. หากพบว่าสายไฟมีรอยไหม้หรือความร้อนสูงผิดปกติ (Overheating) สาเหตุที่พบบ่อยที่สุดคืออะไร?", options: ["ก. ใช้งานเกินเวลา", "ข. จุดต่อหลวม หรือสายเล็กเกินพิกัด", "ค. ระบบกราวด์ไม่ดี", "ง. แรงดันเกิน"], ans: 1 },
            { q: "17. อุปกรณ์ 'Magnetic Contactor' ทำหน้าที่อะไร?", options: ["ก. ตัดวงจรอัตโนมัติเมื่อไฟรั่ว", "ข. ตัดต่อวงจรไฟฟ้ากำลังด้วยแม่เหล็กไฟฟ้า", "ค. ป้องกัน Overload", "ง. ปรับแรงดัน"], ans: 1 },
            { q: "18. เมื่อเกิดเพลิงไหม้จากอุปกรณ์ไฟฟ้า ห้ามใช้สิ่งใดดับไฟเด็ดขาด?", options: ["ก. ถังดับเพลิงชนิด CO2", "ข. ถังดับเพลิงชนิดผงเคมีแห้ง", "ค. น้ำเปล่า", "ง. ทรายแห้ง"], ans: 2 },
            { q: "19. IP Rating (เช่น IP54, IP67) บนอุปกรณ์ไฟฟ้าบอกถึงอะไร?", options: ["ก. ระดับทนแรงดัน", "ข. ระดับป้องกันฝุ่นและน้ำ", "ค. มาตรฐานอุตสาหกรรม", "ง. ระดับฉนวน"], ans: 1 },
            { q: "20. การสตาร์ทมอเตอร์แบบ Star-Delta มีวัตถุประสงค์หลักเพื่ออะไร?", options: ["ก. เพิ่มแรงบิด", "ข. ลดกระแสตอนสตาร์ท", "ค. กลับทิศทางหมุน", "ง. ควบคุมความเร็ว"], ans: 1 }
        ];

        let currentStep = 0;
        const userAnswers = [];

        window.onload = function () {
            document.getElementById('userInfo').textContent = `ผู้เข้าสอบ: คุณ ${userName} | ตำแหน่ง: ${userPos}`;
            renderQuestion();
        };

        function renderQuestion() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = "";

            const item = questions[currentStep];
            const card = document.createElement('div');
            card.className = 'q-card';
            card.innerHTML = `
                <div class="progress-text">ข้อที่ ${currentStep + 1} / ${questions.length}</div>
                <p class="q-text">${item.q}</p>
                <div class="options-grid">
                    ${item.options.map((opt, i) => `
                        <button type="button" class="opt-btn" onclick="selectOption(${i})">
                            ${opt}
                        </button>
                    `).join('')}
                </div>`;
            container.appendChild(card);
        }

        async function selectOption(choiceIndex) {
            const item = questions[currentStep];
            userAnswers.push({
                text: item.options[choiceIndex],
                isCorrect: choiceIndex === item.ans
            });

            if (currentStep < questions.length - 1) {
                currentStep++;
                renderQuestion();
            } else {
                await finishExam();
            }
        }

        async function finishExam() {
            const container = document.getElementById('questionsContainer');
            // เปลี่ยน UI ให้ดูนิ่งขึ้นขณะรอ
            container.innerHTML = `
        <div class="q-card" style="text-align:center; padding: 3rem;">
            <div class="spinner" style="border: 4px solid #f3f3f3; border-top: 4px solid #f1c40f; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
            <h2 style="color:#f1c40f;">กำลังบันทึกข้อมูล...</h2>
            <p>กรุณาอย่าปิดหน้าต่างนี้ ระบบกำลังนำส่งคำถามและคำตอบของคุณ</p>
        </div>
        <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>`;

            let score = 0;
            const payload = {
                targetTab: userPos,
                uuid: uuid,
                name: userName,
                position: userPos,
                answersCount: questions.length,
                userAgent: navigator.userAgent
            };

            userAnswers.forEach((ans, i) => {
                if (ans.isCorrect) score++;
                payload[`q${i + 1}_title`] = questions[i].q; // ส่งคำถาม
                payload[`q${i + 1}_text`] = ans.text;        // ส่งคำตอบ
                payload[`q${i + 1}_score`] = ans.isCorrect ? "1" : "0"; // ส่งคะแนน
            });

            payload.totalScore = String(score);
            payload.hrStatus = score >= 14 ? "🟢 ผ่าน (เรียกสัมภาษณ์)" : (score >= 10 ? "🟡 พิจารณาพิเศษ" : "🔴 ไม่ผ่าน");
            payload.decisionNote = score >= 14 ? "เรียกสัมภาษณ์" : (score >= 10 ? "พิจารณา Resume เพิ่มเติม" : "ไม่แนะนำ");

            try {
                const body = new URLSearchParams();
                for (const key in payload) { body.append(key, payload[key]); }

                await fetch(SCRIPT_URL, { method: "POST", body: body, mode: "no-cors" });

                // ✅ เรียกใช้ Modal แทน alert
                document.getElementById('customModal').style.display = 'block';

            } catch (err) {
                console.error(err);
                // ถึงจะ Error แต่ถ้าส่งไปแล้วก็ให้แสดง Modal เพื่อให้คนสอบกลับหน้าแรกได้
                document.getElementById('customModal').style.display = 'block';
            }
        }

        function goHome() {
            window.location.href = "index.html";
        }
    </script>

    <div id="customModal" style="display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; 
           background: transparent; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);">

        <div class="bg-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;">
        </div>

        <div style="background: rgba(255, 255, 255, 0.1); 
                backdrop-filter: blur(15px); 
                -webkit-backdrop-filter: blur(15px);
                color: white; 
                margin: 12% auto; 
                padding: 3rem 2rem; 
                border-radius: 20px; 
                width: 85%; 
                max-width: 450px; 
                text-align: center; 
                border: 1px solid rgba(255, 255, 255, 0.2); 
                box-shadow: 0 20px 50px rgba(0,0,0,0.5);
                animation: fadeIn 0.5s ease-in-out;">

            <div style="font-size: 4.5rem; margin-bottom: 1.5rem;">✅</div>

            <h2 style="color: #f1c40f; margin-top: 0; font-size: 2rem; text-shadow: 0 2px 10px rgba(0,0,0,0.3);">
                ขอบคุณสำหรับคำตอบ!
            </h2>

            <p style="font-size: 1.2rem; opacity: 0.95; line-height: 1.6; margin-bottom: 2rem;">
                ขอให้คุณโชคดีในการสัมภาษณ์
            </p>

            <button onclick="goHome()" style="background: #27ae60; 
                   color: white; 
                   border: none; 
                   padding: 15px 40px; 
                   border-radius: 12px; 
                   cursor: pointer; 
                   font-size: 1.2rem; 
                   font-weight: bold; 
                   transition: 0.3s; 
                   width: 100%;
                   box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4);">
                ตกลง
            </button>
        </div>
    </div>
</body>


</html>
