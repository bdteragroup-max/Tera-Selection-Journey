<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Business Development Assessment - TERA</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
        .exam-container {
            max-width: 850px;
            margin: 2rem auto;
            padding: 1.5rem;
        }

        .q-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            padding: 1.8rem;
            border-radius: 15px;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .q-text {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
            line-height: 1.6;
        }

        .options-grid {
            display: grid;
            gap: 0.8rem;
        }

        .opt-btn {
            display: block;
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
            line-height: 1.4;
            color: white;
            text-align: left;
            font-size: 1rem;
            width: 100%;
        }

        .opt-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #f1c40f;
        }

        .progress-text {
            color: #f1c40f;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: right;
        }
    </style>
</head>

<body class="page-bg">
    <div class="bg-overlay"></div>
    <div class="exam-container">
        <header style="text-align: center; margin-bottom: 30px; color: white;">
            <img src="./Logo%20Veichi.png" alt="TERA" style="height: 60px;">
            <h1 style="margin-top: 15px;">แบบทดสอบตำแหน่ง เจ้าหน้าที่จัดซื้อ</h1>
            <p id="userInfo" style="opacity: 0.8;"></p>
        </header>

        <div id="questionsContainer">
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzfvCXdieV_wEsn9RUH7icZpeyjSRuZ0AWHO0IUxrmNxkwnp4RE1V3fKA5WnOUo705Xpg/exec";
        const urlParams = new URLSearchParams(window.location.search);

        const userName = urlParams.get('name') || 'ผู้สมัคร';
        const userPos = urlParams.get('position') || 'Purchasing';
        const uuid = urlParams.get('uuid') || "no-uuid";
        const questions = [
            { q: "1. วัตถุประสงค์หลักของงานจัดซื้อคือข้อใด?", options: ["ก. เน้นซื้อให้ “ถูกที่สุด” เป็นอันดับแรก", "ข. จัดหาให้ “ถูกต้องครบ 5R” พร้อมคุมความเสี่ยงและความโปร่งใส", "ค. สร้างความสนิทกับ Supplier เป็นหลักเพื่อให้ขอของด่วนได้ง่าย", "ง. ทำสต็อกให้เต็มคลังเสมอเพื่อกันของขาด"], ans: 1 },
            { q: "2. ขั้นตอนแรกของกระบวนการจัดซื้อ (Purchasing Cycle) คือข้อใด?", options: ["ก. ตรวจรับสินค้าเข้าคลังทันที", "ข. รับใบขอซื้อ (PR) พร้อมตรวจสเปก ปริมาณ และงบประมาณ", "ค. ออกใบสั่งซื้อ (PO) ก่อนเพื่อกันของ", "ง. จ่ายเงินให้ Supplier ก่อนเพื่อเร่งการผลิต"], ans: 1 },
            { q: "3. ในการคัดเลือก Supplier รายใหม่ ปัจจัยใดสำคัญน้อยที่สุด?", options: ["ก. จำนวนพนักงานของผู้ขายเพียงอย่างเดียว", "ข. คุณภาพสินค้าและความสม่ำเสมอ", "ค. ความมั่นคงและชื่อเสียงผู้ขาย", "ง. เงื่อนไขชำระเงิน (Credit Term)"], ans: 0 },
            { q: "4. 'PR' และ 'PO' มีความแตกต่างกันอย่างไร?", options: ["ก. PR เป็นใบส่งของ PO เป็นใบเสร็จ", "ข. PR ใช้ระดับล่าง PO ใช้ระดับบริหาร", "ค. PR คือใบขอซื้อภายในส่วน PO คือคำสั่งซื้ออย่างเป็นทางการถึงผู้ขาย", "ง. PR และ PO ใช้แทนกันได้ทั้งหมด"], ans: 2 },
            { q: "5. หาก Supplier รายประจำขอปรับขึ้นราคาสินค้า 10% คุณควรทำอย่างไรเป็นอันดับแรก?", options: ["ก. ยอมรับราคาทันทีเพื่อกันของขาด", "ข. ขอโครงสร้างต้นทุนและทำ Price Benchmark เปรียบเทียบตลาด", "ค. เลิกสั่งซื้อทันทีเพื่อกดดัน", "ง. ปรับราคาขายของบริษัทขึ้นทันที"], ans: 1 },
            { q: "6. 'Lead Time' ในงานจัดซื้อหมายถึงอะไร?", options: ["ก. เวลาที่ใช้ผลิตสินค้าเพียงอย่างเดียว", "ข. เวลาที่ใช้ประชุมต่อรองราคา", "ค. ระยะเวลารับประกันสินค้า", "ง. ระยะเวลาตั้งแต่ยืนยันคำสั่งซื้อจนได้รับสินค้าใช้งานจริง"], ans: 3 },
            { q: "7. หากพบว่าสินค้าที่ส่งมา 'คุณภาพไม่ตรงตามสเปก' คุณควรทำอย่างไร?", options: ["ก. รับไว้ก่อนแล้วซ่อมเอง", "ข. หักเงินเดือนพนักงานตรวจรับ", "ค. ทำบันทึก NCR แจ้งผู้ขายเพื่อเคลมหรือเปลี่ยน", "ง. นำไปขายต่อให้บริษัทอื่น"], ans: 2 },
            { q: "8. 'Credit Term' ที่นานขึ้น (เช่น จาก 30 วัน เป็น 60 วัน) มีประโยชน์อย่างไร?", options: ["ก. ได้สินค้าเร็วขึ้น", "ข. สินค้าคุณภาพดีขึ้น", "ค. ช่วยลด VAT", "ง. เพิ่มสภาพคล่องและบริหาร Cash Flow ได้ดีขึ้น"], ans: 3 },
            { q: "9. เอกสาร 'Quotation' คือเอกสารชนิดใด?", options: ["ก. ใบแจ้งหนี้เรียกเก็บเงิน", "ข. ใบรับรองมาตรฐานอุตสาหกรรม", "ค. ใบประเมินผลงานพนักงาน", "ง. ใบเสนอราคาที่ผู้ขายแจ้งราคา สเปก และเงื่อนไข"], ans: 3 },
            { q: "10. การเปรียบเทียบราคา (Price Comparison) ควรเทียบอย่างน้อยกี่ราย?", options: ["ก. 1 รายที่ไว้ใจ", "ข. 2 รายเพื่อให้มีตัวเทียบ", "ค. 3 รายขึ้นไป เพื่อเห็นช่วงราคาและลดอคติ", "ง. ไม่ต้องเทียบถ้าสนิทกัน"], ans: 2 },
            { q: "11. หาก Supplier เสนอ 'ค่าคอมมิชชั่นส่วนตัว' ให้ คุณควรทำอย่างไร?", options: ["ก. รับไว้เป็นรางวัลส่วนตัว", "ข. รับแล้วแบ่งเพื่อนร่วมงาน", "ค. ต่อรองขอเพิ่มเป็น 2 เท่า", "ง. ปฏิเสธและรายงานตามนโยบายต่อต้านทุจริต"], ans: 3 },
            { q: "12. 'Incoterms' (เช่น EXW, FOB, CIF) มีความสำคัญอย่างไร?", options: ["ก. เป็นรหัสพิกัดศุลกากร", "ข. เป็นรหัสส่วนลดสินค้า", "ค. เป็นชื่อท่าเรือปลายทาง", "ง. กำหนดขอบเขตความรับผิดชอบ ค่าใช้จ่าย และจุดโอนความเสี่ยง"], ans: 3 },
            { q: "13. การประเมินผู้ขาย (Vendor Evaluation) ประจำปีมีวัตถุประสงค์เพื่ออะไร?", options: ["ก. หาข้ออ้างในการลดราคา", "ข. จัดงานเลี้ยงขอบคุณ", "ค. ขอของขวัญสนับสนุนทีม", "ง. วัดผลคุณภาพ การส่งมอบ และบริการเพื่อตัดสินใจในอนาคต"], ans: 3 },
            { q: "14. คำว่า 'Back Order' หมายความว่าอย่างไร?", options: ["ก. การสั่งซื้อย้อนหลัง", "ข. การส่งสินค้าคืนผู้ขาย", "ค. การยกเลิกใบสั่งซื้อ", "ง. รายการที่สั่งแล้วแต่ผู้ขายยังไม่มีของจึงต้องรอเติมสต็อก"], ans: 3 },
            { q: "15. ในการเจรจาต่อรอง (Negotiation) เป้าหมายที่ควรจะเป็นคือข้อใด?", options: ["ก. ได้ประโยชน์สูงสุดฝ่ายเดียว", "ข. ทำให้ Supplier กลัว", "ค. ยอมตามใจ Supplier ทุกอย่าง", "ง. หาข้อตกลงแบบ Win-Win เพื่อความร่วมมือระยะยาว"], ans: 3 },
            { q: "16. หากคลังแจ้งว่าของใกล้หมดแต่ยังไม่มี PR คุณควรทำอย่างไร?", options: ["ก. รีบสั่งด้วยเงินส่วนตัวก่อน", "ข. นิ่งเฉยจนกว่าจะมี PR", "ค. ด่าคลังที่แจ้งช้า", "ง. ประสานผู้ใช้ให้ออก PR พร้อมตรวจสอบจุดสั่งซื้อ"], ans: 3 },
            { q: "17. 'Centralized Purchasing' (การจัดซื้อรวมศูนย์) มีข้อดีอย่างไร?", options: ["ก. เพิ่มอำนาจต่อรองและคุมมาตรฐานราคา/สเปก", "ข. ทำให้งานล่าช้าเสมอ", "ค. ให้สาขาซื้อของได้ตามใจ", "ง. ลด Supplier เหลือเพียงรายเดียว"], ans: 0 },
            { q: "18. เอกสาร 'Debit Note' (ใบเพิ่มหนี้) ใช้ในกรณีใด?", options: ["ก. ขอลดหนี้จากผู้ขาย", "ข. เพิ่มยอดหนี้เพราะยอดเดิมต่ำกว่าความจริงตามตกลง", "ค. ยืนยันว่ารับของเกิน", "ง. ขอใบกำกับภาษีใหม่"], ans: 1 },
            { q: "19. ความถูกต้องของ 'Unit of Measure' (หน่วยนับ) สำคัญอย่างไร?", options: ["ก. ช่วยให้พิมพ์เอกสารสวย", "ข. ไม่มีผลถ้าราคาเท่าเดิม", "ค. ลดความคลาดเคลื่อนในการสั่ง-ตรวจรับ-สต็อก", "ง. ช่วยให้ส่งของเร็วขึ้น"], ans: 2 },
            { q: "20. จรรยาบรรณวิชาชีพจัดซื้อข้อใดสำคัญที่สุด?", options: ["ก. ความรวดเร็วเป็นหลักแม้เอกสารไม่ครบ", "ข. เลือกซื้อจากญาติเพื่อความเชื่อใจ", "ค. สร้างความสัมพันธ์โดยไม่มีเกณฑ์ตัดสินใจ", "ง. ความซื่อสัตย์ โปร่งใส และไม่มีผลประโยชน์ทับซ้อน"], ans: 3 }
        ];

        let currentStep = 0;
        const userAnswers = [];

        window.onload = function () {
            document.getElementById('userInfo').textContent = `ผู้เข้าสอบ: คุณ ${userName} | ตำแหน่ง: ${userPos}`;
            renderQuestion();
        };

        function renderQuestion() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = "";

            const item = questions[currentStep];
            const card = document.createElement('div');
            card.className = 'q-card';
            card.innerHTML = `
                <div class="progress-text">ข้อที่ ${currentStep + 1} / ${questions.length}</div>
                <p class="q-text">${item.q}</p>
                <div class="options-grid">
                    ${item.options.map((opt, i) => `
                        <button type="button" class="opt-btn" onclick="selectOption(${i})">
                            ${opt}
                        </button>
                    `).join('')}
                </div>`;
            container.appendChild(card);
        }

        async function selectOption(choiceIndex) {
            const item = questions[currentStep];
            userAnswers.push({
                text: item.options[choiceIndex],
                isCorrect: choiceIndex === item.ans
            });

            if (currentStep < questions.length - 1) {
                currentStep++;
                renderQuestion();
            } else {
                await finishExam();
            }
        }

        async function finishExam() {
            const container = document.getElementById('questionsContainer');
            // เปลี่ยน UI ให้ดูนิ่งขึ้นขณะรอ
            container.innerHTML = `
        <div class="q-card" style="text-align:center; padding: 3rem;">
            <div class="spinner" style="border: 4px solid #f3f3f3; border-top: 4px solid #f1c40f; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
            <h2 style="color:#f1c40f;">กำลังบันทึกข้อมูล...</h2>
            <p>กรุณาอย่าปิดหน้าต่างนี้ ระบบกำลังนำส่งคำถามและคำตอบของคุณ</p>
        </div>
        <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>`;

            let score = 0;
            const payload = {
                targetTab: userPos,
                uuid: uuid,
                name: userName,
                position: userPos,
                answersCount: questions.length,
                userAgent: navigator.userAgent
            };

            userAnswers.forEach((ans, i) => {
                if (ans.isCorrect) score++;
                payload[`q${i + 1}_title`] = questions[i].q; // ส่งคำถาม
                payload[`q${i + 1}_text`] = ans.text;        // ส่งคำตอบ
                payload[`q${i + 1}_score`] = ans.isCorrect ? "1" : "0"; // ส่งคะแนน
            });

            payload.totalScore = String(score);
            payload.hrStatus = score >= 14 ? "🟢 ผ่าน (เรียกสัมภาษณ์)" : (score >= 10 ? "🟡 พิจารณาพิเศษ" : "🔴 ไม่ผ่าน");
            payload.decisionNote = score >= 14 ? "เรียกสัมภาษณ์" : (score >= 10 ? "พิจารณา Resume เพิ่มเติม" : "ไม่แนะนำ");

            try {
                const body = new URLSearchParams();
                for (const key in payload) { body.append(key, payload[key]); }

                await fetch(SCRIPT_URL, { method: "POST", body: body, mode: "no-cors" });

                // ✅ เรียกใช้ Modal แทน alert
                document.getElementById('customModal').style.display = 'block';

            } catch (err) {
                console.error(err);
                // ถึงจะ Error แต่ถ้าส่งไปแล้วก็ให้แสดง Modal เพื่อให้คนสอบกลับหน้าแรกได้
                document.getElementById('customModal').style.display = 'block';
            }
        }

        function goHome() {
            window.location.href = "index.html";
        }
    </script>

    <div id="customModal" style="display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; 
           background: transparent; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);">

        <div class="bg-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;">
        </div>

        <div style="background: rgba(255, 255, 255, 0.1); 
                backdrop-filter: blur(15px); 
                -webkit-backdrop-filter: blur(15px);
                color: white; 
                margin: 12% auto; 
                padding: 3rem 2rem; 
                border-radius: 20px; 
                width: 85%; 
                max-width: 450px; 
                text-align: center; 
                border: 1px solid rgba(255, 255, 255, 0.2); 
                box-shadow: 0 20px 50px rgba(0,0,0,0.5);
                animation: fadeIn 0.5s ease-in-out;">

            <div style="font-size: 4.5rem; margin-bottom: 1.5rem;">✅</div>

            <h2 style="color: #f1c40f; margin-top: 0; font-size: 2rem; text-shadow: 0 2px 10px rgba(0,0,0,0.3);">
                ขอบคุณสำหรับคำตอบ!
            </h2>

            <p style="font-size: 1.2rem; opacity: 0.95; line-height: 1.6; margin-bottom: 2rem;">
                ขอให้คุณโชคดีในการสัมภาษณ์
            </p>

            <button onclick="goHome()" style="background: #27ae60; 
                   color: white; 
                   border: none; 
                   padding: 15px 40px; 
                   border-radius: 12px; 
                   cursor: pointer; 
                   font-size: 1.2rem; 
                   font-weight: bold; 
                   transition: 0.3s; 
                   width: 100%;
                   box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4);">
                ตกลง
            </button>
        </div>
    </div>
</body>


</html>
